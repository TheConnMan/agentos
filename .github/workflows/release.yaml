name: Release images and binaries

# Two triggers, one workflow, so a single ref carries both artifacts:
#  - push to main            -> publish images tagged sha + latest (continuous).
#  - push a v* tag           -> publish images tagged with the version AND build,
#                               strip, and attach the agentos CLI binaries to a
#                               GitHub Release with generated notes.
#
# IMAGE SCOPE NOTE: all five first-party images are built here -- the runner
# (runner/Dockerfile) plus the four app services. Every image builds from the
# repo root: the Python images resolve the uv workspace, and the UI resolves the
# frozen ACI generated TS its @aci alias points at (outside apps/ui).
#
# MULTI-ARCH: every published image is a linux/amd64 + linux/arm64 manifest.
# Each arch builds on its own native GitHub-hosted runner (arm64 runners are free
# for public repos), pushes the single-arch image by digest, and a per-image
# `merge` job assembles the multi-arch manifest with `docker buildx imagetools
# create` -- no QEMU emulation on the critical path. The gha build cache is
# scoped per image+arch so the two arches never clobber each other's cache.

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.name }} image (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        name: [runner, api, dispatcher, worker, ui]
        platform: [linux/amd64, linux/arm64]
        include:
          - name: runner
            dockerfile: runner/Dockerfile
          - name: api
            dockerfile: apps/api/Dockerfile
          - name: dispatcher
            dockerfile: apps/dispatcher/Dockerfile
          - name: worker
            dockerfile: apps/worker/Dockerfile
          - name: ui
            dockerfile: apps/ui/Dockerfile
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/agentos-${{ matrix.name }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ghcr.io/${{ github.repository_owner }}/agentos-${{ matrix.name }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.name }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}-${{ matrix.arch }}
      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-image-${{ matrix.name }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge ${{ matrix.name }} manifest
    needs: [build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        name: [runner, api, dispatcher, worker, ui]
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-image-${{ matrix.name }}-*
          merge-multiple: true
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/agentos-${{ matrix.name }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          # shellcheck disable=SC2046  # intentional word-splitting: expand -t <tag> flags and the digest ref list into separate args
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository_owner }}/agentos-${{ matrix.name }}@sha256:%s ' *)
      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/agentos-${{ matrix.name }}:${{ steps.meta.outputs.version }}

  worker-local-build:
    name: Build worker-local overlay (${{ matrix.platform }})
    needs: [merge]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Compute base tag
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "v=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "v=latest" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/agentos-worker-local
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: compose
          file: compose/worker-local.Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            BASE_TAG=${{ steps.ver.outputs.v }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ghcr.io/${{ github.repository_owner }}/agentos-worker-local
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=worker-local-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=worker-local-${{ matrix.arch }}
      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-worker-local-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  worker-local-merge:
    name: Merge worker-local manifest
    needs: [worker-local-build]
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-worker-local-*
          merge-multiple: true
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/agentos-worker-local
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          # shellcheck disable=SC2046  # intentional word-splitting: expand -t <tag> flags and the digest ref list into separate args
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository_owner }}/agentos-worker-local@sha256:%s ' *)
      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/agentos-worker-local:${{ steps.meta.outputs.version }}

  cli-binaries:
    name: Build agentos CLI (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # glibc for the MVP: the CLI links rustls (no OpenSSL), but a musl build
          # needs the musl C cross-toolchain in the runner; glibc is the simple,
          # portable-enough default. Swap to x86_64-unknown-linux-musl (add
          # musl-tools) later if a fully static binary is wanted.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - name: Assert tag matches Cargo.toml version
        working-directory: cli
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(grep -m1 '^version' Cargo.toml | sed -E 's/version = "(.*)"/\1/')"
          if [ "$tag" != "$pkg" ]; then
            echo "tag v$tag does not match cli/Cargo.toml version $pkg" >&2
            exit 1
          fi
      - name: Build release
        working-directory: cli
        env:
          AGENTOS_BUILD_CHANNEL: release
        run: cargo build --release --target ${{ matrix.target }}
      - name: Strip and name the binary
        run: |
          bin="cli/target/${{ matrix.target }}/release/agentos"
          strip "$bin" || true
          mkdir -p dist
          cp "$bin" "dist/agentos-${{ matrix.target }}"
      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: agentos-${{ matrix.target }}
          path: dist/agentos-${{ matrix.target }}
          if-no-files-found: error

  chart:
    name: Package chart and release compose
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
      - name: Pin chart image tags to the release version
        run: |
          version="${GITHUB_REF_NAME#v}"
          before="$(grep -cE '^[[:space:]]*tag: latest$' charts/agentos/values.yaml)"
          if [ "$before" -ne 5 ]; then
            echo "expected 5 'tag: latest' entries in values.yaml, found $before" >&2
            exit 1
          fi
          sed -i -E "s/^([[:space:]]*tag:) latest$/\1 \"${version}\"/" charts/agentos/values.yaml
      - name: Package chart
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          helm package charts/agentos --version "$version" --app-version "$version" -d dist
      - name: Generate and stage the release compose
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          python3 compose/generate_release_compose.py --version "${version}" > dist/compose.release.yaml
      - name: Upload chart artifact
        uses: actions/upload-artifact@v7
        with:
          name: agentos-chart
          path: dist/agentos-*.tgz
          if-no-files-found: error
      - name: Upload release compose artifact
        uses: actions/upload-artifact@v7
        with:
          name: agentos-compose
          path: dist/compose.release.yaml
          if-no-files-found: error

  release:
    name: Attach binaries to the GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [merge, cli-binaries, chart, worker-local-merge]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built binaries
        uses: actions/download-artifact@v8
        with:
          pattern: agentos-*
          path: dist
          merge-multiple: true
      - name: Create release with generated notes
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            dist/agentos-*
            dist/compose.release.yaml
          generate_release_notes: true
