name: Release images and binaries

# Two triggers, one workflow, so a single ref carries both artifacts:
#  - push to main            -> publish images tagged sha + latest (continuous).
#  - push a v* tag           -> publish images tagged with the version AND build,
#                               strip, and attach the agentos CLI binaries to a
#                               GitHub Release with generated notes.
#
# IMAGE SCOPE NOTE: only the runner currently has a Dockerfile (runner/Dockerfile)
# and is the only first-party image the chart deploys. api/dispatcher/worker/ui
# have no Dockerfile yet; they drop into the matrix as one entry each once built.

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  images:
    name: Build and push ${{ matrix.name }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: runner
            context: .
            dockerfile: runner/Dockerfile
          # Add when their Dockerfiles exist (owned by the app tasks):
          # - { name: api,        context: ., dockerfile: apps/api/Dockerfile }
          # - { name: dispatcher, context: ., dockerfile: apps/dispatcher/Dockerfile }
          # - { name: worker,     context: ., dockerfile: apps/worker/Dockerfile }
          # - { name: ui,         context: apps/ui, dockerfile: apps/ui/Dockerfile }
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/agentos-${{ matrix.name }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cli-binaries:
    name: Build agentos CLI (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # glibc for the MVP: the CLI links rustls (no OpenSSL), but a musl build
          # needs the musl C cross-toolchain in the runner; glibc is the simple,
          # portable-enough default. Swap to x86_64-unknown-linux-musl (add
          # musl-tools) later if a fully static binary is wanted.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - name: Build release
        working-directory: cli
        run: cargo build --release --target ${{ matrix.target }}
      - name: Strip and name the binary
        run: |
          bin="cli/target/${{ matrix.target }}/release/agentos"
          strip "$bin" || true
          mkdir -p dist
          cp "$bin" "dist/agentos-${{ matrix.target }}"
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentos-${{ matrix.target }}
          path: dist/agentos-${{ matrix.target }}
          if-no-files-found: error

  release:
    name: Attach binaries to the GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [images, cli-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built binaries
        uses: actions/download-artifact@v4
        with:
          pattern: agentos-*
          path: dist
          merge-multiple: true
      - name: Create release with generated notes
        uses: softprops/action-gh-release@v2
        with:
          files: dist/agentos-*
          generate_release_notes: true
