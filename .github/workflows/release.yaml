name: Release images

# Build and push the first-party service images to GHCR on every push to main,
# tagged with the commit SHA and `latest`. Pull requests do not publish.
#
# SCOPE NOTE: only the runner currently has a Dockerfile (runner/Dockerfile) and
# is the only first-party image the chart deploys. api/dispatcher/worker/ui have
# no Dockerfile yet and are not deployed by the chart, so they are not built
# here. The build is a matrix so each drops in as one entry once its Dockerfile
# lands -- add {name, context, dockerfile} and nothing else changes.

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  images:
    name: Build and push ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: runner
            context: .
            dockerfile: runner/Dockerfile
          # Add when their Dockerfiles exist (owned by the app tasks):
          # - { name: api,        context: ., dockerfile: apps/api/Dockerfile }
          # - { name: dispatcher, context: ., dockerfile: apps/dispatcher/Dockerfile }
          # - { name: worker,     context: ., dockerfile: apps/worker/Dockerfile }
          # - { name: ui,         context: apps/ui, dockerfile: apps/ui/Dockerfile }
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata (sha + latest)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/agentos-${{ matrix.name }}
          tags: |
            type=sha,format=long
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
