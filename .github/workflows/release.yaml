name: Release images and binaries

# Two triggers, one workflow, so a single ref carries both artifacts:
#  - push to main            -> publish images tagged sha + latest (continuous).
#  - push a v* tag           -> publish images tagged with the version AND build,
#                               strip, and attach the agentos CLI binaries to a
#                               GitHub Release with generated notes.
#
# IMAGE SCOPE NOTE: all five first-party images are built here -- the runner
# (runner/Dockerfile) plus the four app services. Every image builds from the
# repo root: the Python images resolve the uv workspace, and the UI resolves the
# frozen ACI generated TS its @aci alias points at (outside apps/ui).
#
# MULTI-ARCH: every published image is a linux/amd64 + linux/arm64 manifest.
# Each arch builds on its own native GitHub-hosted runner (arm64 runners are free
# for public repos), pushes the single-arch image by digest, and a per-image
# `merge` job assembles the multi-arch manifest with `docker buildx imagetools
# create` -- no QEMU emulation on the critical path. The gha build cache is
# scoped per image+arch so the two arches never clobber each other's cache.

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  # Gates the ENTIRE tag-triggered publish pipeline (issue #628). A `v*` tag push
  # proves nothing about the tagged commit on its own, so nothing below may run
  # for one until this job says the commit is reviewed, on main, and green --
  # see ADR-0058 for the full design and the two admin-only settings (a `v*` tag
  # protection rule, required reviewers on the `release-publish` environment)
  # that hardens this further once a maintainer configures them.
  #
  # `if:` makes this a no-op (skipped) for ordinary pushes to `main`, so the
  # continuous sha/latest image builds below are unaffected. `environment:` has
  # no effect until required reviewers are added to it; the day they are, every
  # tag push pauses for approval right here, before anything else runs.
  authorize-release:
    name: Authorize release publication
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: release-publish
    permissions:
      contents: read
      checks: read
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history: an ancestor commit deep in main's log must stay
          # reachable, which a shallow clone would hide.
          fetch-depth: 0
          persist-credentials: false
      - name: Tag's commit must be reviewed, on main, and fully checked
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 release/authorize.py "$GITHUB_SHA" --repo "$GITHUB_REPOSITORY"

  build:
    name: Build ${{ matrix.name }} image (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: [authorize-release]
    # `always()` overrides the default needs-propagation (which would skip this
    # job whenever authorize-release is merely skipped, i.e. on every ordinary
    # main push): a `skipped` authorize-release means "not a tag push, nothing to
    # authorize" and this job proceeds; a `failure` result means an unauthorized
    # tag, and this job -- and everything downstream of it -- does not run.
    if: |
      always() &&
      (needs.authorize-release.result == 'success' || needs.authorize-release.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        name: [runner, api, dispatcher, worker, ui]
        platform: [linux/amd64, linux/arm64]
        include:
          - name: runner
            dockerfile: runner/Dockerfile
          - name: api
            dockerfile: apps/api/Dockerfile
          - name: dispatcher
            dockerfile: apps/dispatcher/Dockerfile
          - name: worker
            dockerfile: apps/worker/Dockerfile
          - name: ui
            dockerfile: apps/ui/Dockerfile
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/agentos-${{ matrix.name }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ghcr.io/${{ github.repository_owner }}/agentos-${{ matrix.name }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.name }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}-${{ matrix.arch }}
      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-image-${{ matrix.name }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge ${{ matrix.name }} manifest
    needs: [build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        name: [runner, api, dispatcher, worker, ui]
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-image-${{ matrix.name }}-*
          merge-multiple: true
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/agentos-${{ matrix.name }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          # shellcheck disable=SC2046  # intentional word-splitting: expand -t <tag> flags and the digest ref list into separate args
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository_owner }}/agentos-${{ matrix.name }}@sha256:%s ' *)
      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/agentos-${{ matrix.name }}:${{ steps.meta.outputs.version }}

  worker-local-build:
    name: Build worker-local overlay (${{ matrix.platform }})
    needs: [merge]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Compute base tag
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "v=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "v=latest" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/agentos-worker-local
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: compose
          file: compose/worker-local.Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            BASE_TAG=${{ steps.ver.outputs.v }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ghcr.io/${{ github.repository_owner }}/agentos-worker-local
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=worker-local-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=worker-local-${{ matrix.arch }}
      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-worker-local-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  worker-local-merge:
    name: Merge worker-local manifest
    needs: [worker-local-build]
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-worker-local-*
          merge-multiple: true
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/agentos-worker-local
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          # shellcheck disable=SC2046  # intentional word-splitting: expand -t <tag> flags and the digest ref list into separate args
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository_owner }}/agentos-worker-local@sha256:%s ' *)
      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/agentos-worker-local:${{ steps.meta.outputs.version }}

  cli-binaries:
    name: Build agentos CLI (${{ matrix.target }})
    needs: [authorize-release]
    # See build's identical condition above: proceed on the tag path only once
    # authorize-release has actually succeeded (not merely been skipped).
    if: startsWith(github.ref, 'refs/tags/v') && needs.authorize-release.result == 'success'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # glibc for the MVP: the CLI links rustls (no OpenSSL), but a musl build
          # needs the musl C cross-toolchain in the runner; glibc is the simple,
          # portable-enough default. Swap to x86_64-unknown-linux-musl (add
          # musl-tools) later if a fully static binary is wanted.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - name: Assert tag matches the release-coupled versions
        run: |
          set -euo pipefail
          # The three fields (cli/Cargo.toml, Chart.yaml version + appVersion)
          # must agree with each other AND with the tag; a stale appVersion ships
          # a chart that pulls the wrong runner image (#489).
          bash scripts/check-version-consistency.sh
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(grep -m1 '^version' cli/Cargo.toml | sed -E 's/version = "(.*)"/\1/')"
          if [ "$tag" != "$pkg" ]; then
            echo "tag v$tag does not match the release version $pkg" >&2
            exit 1
          fi
      - name: Build release
        working-directory: cli
        env:
          AGENTOS_BUILD_CHANNEL: release
        run: cargo build --release --target ${{ matrix.target }}
      - name: Strip and name the binary
        run: |
          bin="cli/target/${{ matrix.target }}/release/agentos"
          strip "$bin" || true
          mkdir -p dist
          cp "$bin" "dist/agentos-${{ matrix.target }}"
      # Cataloged from Cargo.lock, not the stripped binary: the lockfile is what
      # actually names every crate that went in, and stripping removes the symbols
      # a binary scan would need. Scanning the cli/ tree instead would also drag in
      # cli/target/, which the build step above has just filled with rlibs (#629).
      - name: Generate the CLI SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: cli/Cargo.lock
          format: spdx-json
          output-file: dist/agentos-${{ matrix.target }}.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: agentos-${{ matrix.target }}
          path: |
            dist/agentos-${{ matrix.target }}
            dist/agentos-${{ matrix.target }}.spdx.json
          if-no-files-found: error

  chart:
    name: Package chart and release compose
    needs: [authorize-release]
    if: startsWith(github.ref, 'refs/tags/v') && needs.authorize-release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
      - name: Resolve version
        id: ver
        run: echo "v=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Package chart
        run: |
          version="${{ steps.ver.outputs.v }}"
          mkdir -p dist
          helm package charts/agentos --version "$version" --app-version "$version" -d dist
      - name: Generate and stage the release compose
        run: |
          version="${{ steps.ver.outputs.v }}"
          mkdir -p dist
          python3 compose/generate_release_compose.py --version "${version}" > dist/compose.release.yaml
      # The chart and the compose file are deployment manifests, so these SBOMs
      # inventory the packaged artifact itself. The dependency graph of what they
      # pin lives in the agentos-* images, which do NOT carry SBOMs or provenance
      # today -- that is #62, still open. Do not read this as coverage existing
      # elsewhere; it does not yet.
      - name: Generate the chart SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: dist/agentos-${{ steps.ver.outputs.v }}.tgz
          format: spdx-json
          output-file: dist/agentos-${{ steps.ver.outputs.v }}.tgz.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Generate the compose SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: dist/compose.release.yaml
          format: spdx-json
          output-file: dist/compose.release.yaml.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Upload chart artifact
        uses: actions/upload-artifact@v7
        with:
          name: agentos-chart
          path: |
            dist/agentos-*.tgz
            dist/agentos-*.tgz.spdx.json
          if-no-files-found: error
      - name: Upload release compose artifact
        uses: actions/upload-artifact@v7
        with:
          name: agentos-compose
          path: |
            dist/compose.release.yaml
            dist/compose.release.yaml.spdx.json
          if-no-files-found: error

  release:
    name: Attach binaries to the GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [merge, cli-binaries, chart, worker-local-merge]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # Keyless cosign signing and build provenance both mint a short-lived OIDC
      # identity for this workflow run; there is no long-lived signing key (#629).
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Download built binaries
        uses: actions/download-artifact@v8
        with:
          pattern: agentos-*
          path: dist
          merge-multiple: true
      - name: Resolve version
        id: ver
        run: echo "v=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      # The gate runs BEFORE signing, not after: cosign will happily sign an
      # incomplete manifest, laundering a coverage gap into a valid signature.
      # Refusing to build the manifest at all is what makes the release fail
      # closed when an asset or its SBOM is missing (#629).
      - name: Gate the asset set and build the checksum manifest
        run: python3 release/integrity.py manifest --dist dist --version "${{ steps.ver.outputs.v }}"
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign the checksum manifest
        run: |
          cosign sign-blob --yes \
            --bundle dist/checksums.txt.sigstore.json \
            dist/checksums.txt
      # One attestation covering every file in dist, the manifest included, so each
      # asset carries SLSA provenance naming this repo, this workflow, and the
      # release commit. Runs after signing so the bundle is a subject too.
      - name: Attest build provenance for every asset
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/*
      # action-gh-release honors `draft:` only when it CREATES the release; if one
      # already exists for the tag it reuses that release's own draft state
      # (`draft: existingRelease.draft`) and uploads onto it. Every release this repo
      # has published is draft=false, so re-running a published tag -- to clear a
      # flake, say -- would push assets straight onto the live release and skip every
      # check below. Refuse instead of silently bypassing the gate.
      - name: Refuse to re-release an already-published tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Distinguish "no such release" from "gh could not tell us". Treating every
          # nonzero exit as absent would fail OPEN: a 503 or a rate limit on a
          # published tag would read as absent and upload onto the live release,
          # which is the exact defect this step exists to prevent.
          if state=$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --json isDraft --jq .isDraft 2>err.txt); then
            :
          elif grep -qi 'release not found' err.txt; then
            state=absent
          else
            echo "::error::cannot determine the release state of $GITHUB_REF_NAME; refusing to stage a draft against an unknown state." >&2
            cat err.txt >&2
            exit 1
          fi
          if [ "$state" = "false" ]; then
            echo "::error::$GITHUB_REF_NAME is already published. Re-running would upload assets onto the live release without verifying them. Delete the release and re-run, or cut a new tag." >&2
            exit 1
          fi
          echo "tag state: $state (absent or draft) -- safe to stage a draft"
      # Created as a DRAFT. A draft's assets are not publicly downloadable, so
      # nothing reaches a user until verify-and-publish has re-verified the
      # published bytes and promoted the release. Publishing first and verifying
      # after would mean an unverifiable release is already installed by the time
      # the workflow goes red (#629).
      - name: Create draft release with generated notes
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          # Everything staged in dist is published: assets, their SBOMs, the
          # checksum manifest, and its signature.
          files: dist/*
          generate_release_notes: true
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}

  verify-and-publish:
    name: Verify the draft release, then publish it
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      # write, not read: promoting the draft to published is this job's whole
      # point, and a draft is only visible to a token with push access.
      contents: write
      attestations: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Resolve version
        id: ver
        run: echo "v=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      # Re-download what users will actually get, rather than trusting the dist
      # directory we uploaded from. This is the check that the documented
      # verification path in docs/release-verification.md really works, and it
      # also catches a create-release that uploaded only some of its assets.
      - name: Download the draft's assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --dir dist
      - name: Every asset is checksummed and carries an SBOM
        run: python3 release/integrity.py verify --dist dist --version "${{ steps.ver.outputs.v }}"
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      # GITHUB_WORKFLOW_REF *is* the certificate's SAN suffix, so it cannot drift
      # from the identity cosign actually minted if this file is ever renamed.
      - name: The checksum manifest signature is this workflow's
        run: |
          cosign verify-blob \
            --bundle dist/checksums.txt.sigstore.json \
            --certificate-identity "https://github.com/${GITHUB_WORKFLOW_REF}" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            dist/checksums.txt
      - name: Every asset has provenance from this workflow and commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in dist/*; do
            echo "== $f"
            gh attestation verify "$f" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release.yaml" \
              --source-ref "$GITHUB_REF" \
              --source-digest "$GITHUB_SHA"
          done
      # Only now does the release become something a user can download. Every step
      # above had to pass to get here, which is what makes "the release fails if an
      # integrity artifact is missing or unverifiable" true rather than aspirational.
      - name: Publish the verified release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          latest=true
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then latest=false; fi   # rc tags never become latest
          # --latest MUST keep the `=` form: the flag's NoOptDefVal is "true", so the
          # space-separated `--latest false` would mean --latest=true plus a stray arg,
          # and every rc would land as latest.
          gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --draft=false --latest="$latest"
