name: Release images and binaries

# Two triggers, one workflow, so a single ref carries both artifacts:
#  - push to main            -> publish images tagged sha + latest (continuous).
#  - push a v* tag           -> publish images tagged with the version AND build,
#                               strip, and attach the agentos CLI binaries to a
#                               GitHub Release with generated notes.
#
# IMAGE SCOPE NOTE: all five first-party images are built here -- the runner
# (runner/Dockerfile) plus the four app services. Every image builds from the
# repo root: the Python images resolve the uv workspace, and the UI resolves the
# frozen ACI generated TS its @aci alias points at (outside apps/ui).

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  images:
    name: Build and push ${{ matrix.name }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: runner
            context: .
            dockerfile: runner/Dockerfile
          - name: api
            context: .
            dockerfile: apps/api/Dockerfile
          - name: dispatcher
            context: .
            dockerfile: apps/dispatcher/Dockerfile
          - name: worker
            context: .
            dockerfile: apps/worker/Dockerfile
          - name: ui
            context: .
            dockerfile: apps/ui/Dockerfile
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/agentos-${{ matrix.name }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  worker-local:
    name: Build and push the worker-local overlay image
    needs: [images]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Compute base tag
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "v=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "v=latest" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/agentos-worker-local
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: compose
          file: compose/worker-local.Dockerfile
          push: true
          build-args: |
            BASE_TAG=${{ steps.ver.outputs.v }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cli-binaries:
    name: Build agentos CLI (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # glibc for the MVP: the CLI links rustls (no OpenSSL), but a musl build
          # needs the musl C cross-toolchain in the runner; glibc is the simple,
          # portable-enough default. Swap to x86_64-unknown-linux-musl (add
          # musl-tools) later if a fully static binary is wanted.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - name: Assert tag matches Cargo.toml version
        working-directory: cli
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(grep -m1 '^version' Cargo.toml | sed -E 's/version = "(.*)"/\1/')"
          if [ "$tag" != "$pkg" ]; then
            echo "tag v$tag does not match cli/Cargo.toml version $pkg" >&2
            exit 1
          fi
      - name: Build release
        working-directory: cli
        env:
          AGENTOS_BUILD_CHANNEL: release
        run: cargo build --release --target ${{ matrix.target }}
      - name: Strip and name the binary
        run: |
          bin="cli/target/${{ matrix.target }}/release/agentos"
          strip "$bin" || true
          mkdir -p dist
          cp "$bin" "dist/agentos-${{ matrix.target }}"
      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: agentos-${{ matrix.target }}
          path: dist/agentos-${{ matrix.target }}
          if-no-files-found: error

  chart:
    name: Package chart and release compose
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
      - name: Pin chart image tags to the release version
        run: |
          version="${GITHUB_REF_NAME#v}"
          before="$(grep -cE '^[[:space:]]*tag: latest$' charts/agentos/values.yaml)"
          if [ "$before" -ne 5 ]; then
            echo "expected 5 'tag: latest' entries in values.yaml, found $before" >&2
            exit 1
          fi
          sed -i -E "s/^([[:space:]]*tag:) latest$/\1 \"${version}\"/" charts/agentos/values.yaml
      - name: Package chart
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          helm package charts/agentos --version "$version" --app-version "$version" -d dist
      - name: Generate and stage the release compose
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          python3 compose/generate_release_compose.py --version "${version}" > dist/compose.release.yaml
      - name: Upload chart artifact
        uses: actions/upload-artifact@v7
        with:
          name: agentos-chart
          path: dist/agentos-*.tgz
          if-no-files-found: error
      - name: Upload release compose artifact
        uses: actions/upload-artifact@v7
        with:
          name: agentos-compose
          path: dist/compose.release.yaml
          if-no-files-found: error

  release:
    name: Attach binaries to the GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [images, cli-binaries, chart, worker-local]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built binaries
        uses: actions/download-artifact@v8
        with:
          pattern: agentos-*
          path: dist
          merge-multiple: true
      - name: Create release with generated notes
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: |
            dist/agentos-*
            dist/compose.release.yaml
          generate_release_notes: true
