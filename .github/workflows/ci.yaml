name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Sync workspace
        run: uv sync
      - name: Ruff
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy
      - name: Pytest
        run: uv run pytest -q

  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Toolchain
        run: rustup component add rustfmt clippy
      - name: Fmt
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Test
        run: cargo test

  ui:
    name: UI (placeholder until H1a)
    runs-on: ubuntu-latest
    steps:
      - name: Skip
        run: echo "apps/ui is reserved; H1a scaffolds the Vite app and its pnpm + Playwright jobs replace this step."
