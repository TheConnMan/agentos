name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Sync workspace
        run: uv sync
      - name: Ruff
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy
      - name: Pytest
        run: uv run pytest -q

  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Toolchain
        run: rustup component add rustfmt clippy
      - name: Fmt
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Test
        run: cargo test
      - name: Generated ACI protocol crate compiles
        working-directory: packages/aci-protocol/generated/rust
        run: cargo test

  contracts-ts:
    name: Contracts (generated TypeScript compiles)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Regenerate TypeScript from the committed schema and check for drift
        run: |
          npx --yes json-schema-to-typescript@15 \
            packages/aci-protocol/schema/aci-protocol.schema.json \
            --unreachableDefinitions --no-additionalProperties=false \
            -o packages/aci-protocol/generated/ts/aci-protocol.ts
          git diff --exit-code -- packages/aci-protocol/generated/ts/aci-protocol.ts
      - name: tsc --noEmit on generated ACI types
        run: npx --yes -p typescript@5 tsc --noEmit -p packages/aci-protocol/generated/ts/tsconfig.json

  ui:
    name: UI (placeholder until H1a)
    runs-on: ubuntu-latest
    steps:
      - name: Skip
        run: echo "apps/ui is reserved; H1a scaffolds the Vite app and its pnpm + Playwright jobs replace this step."
