name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Supersede an in-flight run when a branch is pushed again so runs stop
# stacking. Keyed per workflow+ref: each PR branch and main have independent
# groups, and a new push to a branch cancels only that branch's older run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    name: Python (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          python-version: "3.13"
      # Fail fast if uv.lock has drifted from the pyproject.toml files (a
      # dependency edit committed without re-locking). --check resolves and
      # compares without writing, so it never mutates the checkout.
      - name: Lockfile is up to date
        run: uv lock --check
      - name: Sync workspace
        run: uv sync
      - name: Ruff
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy
      # Regenerate the interface-catalog seam table and per-doc headers from
      # each seam's front-matter, fail on drift, then lint every citation under
      # docs/ (excluding docs/adr/). A cheap, cluster-free gate, so it runs
      # right after ruff/mypy and before the dev stack boots.
      - name: Interface catalog docs (generate + drift + citation lint)
        run: bash scripts/check-docs.sh
      # _AciModel tolerant-decode gate (#625, following #492): every direct
      # ClassName.model_validate*(...) call on an _AciModel subclass must thread
      # READER_CONTEXT or be a declared allowlist exception. Another cheap,
      # cluster-free static gate, so it runs alongside the docs gate.
      - name: Wire tolerance gate (_AciModel model_validate call sites)
        run: bash scripts/check-wire-tolerance.sh
      # Integration tests dial the real dev stack (Postgres 25432, Valkey 26379,
      # MinIO 29000, Langfuse 23000 + ClickHouse + OTel Collector). Boot it after
      # ruff/mypy so cheap failures stay fast. The first up starts the one-shot
      # minio-init that creates the langfuse bucket alongside the long-lived
      # services; the second --waits only on the long-lived ones (minio-init is
      # kept out of the wait set because --wait treats its exit(0) as a failure).
      # The app services (agentos-api, agentos-migrate) are deliberately NOT
      # started: the suite runs the app in-process via uv and migrates the shared
      # DB with alembic below, so their image is never needed here -- and it lives
      # in a private registry, so a bare `up` that pulled it failed the job.
      - name: Start dev stack
        run: |
          docker compose -f compose.dev.yaml up -d \
            postgres valkey clickhouse minio minio-init \
            langfuse-web langfuse-worker otel-collector
          docker compose -f compose.dev.yaml up -d --wait --wait-timeout 300 \
            postgres valkey clickhouse minio \
            langfuse-web langfuse-worker otel-collector
      # Langfuse web has no compose healthcheck, so --wait returns once its
      # container is merely running. Poll its public health endpoint until it is
      # actually serving; the Langfuse-backed tests skip themselves when the
      # stack is unreachable, so this gate is what keeps them running for real.
      - name: Wait for Langfuse to serve
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:23000/api/public/health >/dev/null 2>&1; then
              echo "Langfuse ready after attempt ${i}"; exit 0
            fi
            sleep 3
          done
          echo "Langfuse did not become ready within 180s"; exit 1
      # The apps/api suite provisions a throwaway migrated DB per run, but the
      # worker binding integration tests dial the shared default database and
      # assume the agentos schema already exists (as it does on a dev box).
      # Apply the real migrations to it so those tests run against a real
      # schema; this also exercises the alembic upgrade path on virgin Postgres.
      - name: Migrate the shared database
        working-directory: apps/api
        run: uv run alembic upgrade head
      # The committed-lock test only proves the lock matches the current wire; it
      # passes even if the lock was regenerated without a version bump. Compare
      # against the BASE branch's lock so an unbumped wire change actually fails
      # CI. The shallow checkout has no base ref, so fetch it depth=1; a missing
      # or empty base lock (base predates the lock) skips cleanly (exit 0), and
      # only a genuine unbumped wire change vs an existing base lock exits 1.
      - name: ACI wire-lock base gate
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.base_ref || 'main' }}" || true
          git show "origin/${{ github.base_ref || 'main' }}:packages/aci-protocol/schema/wire.lock" > /tmp/base-wire.lock 2>/dev/null || true
          uv run python -m aci_protocol.wire_lock --check-base /tmp/base-wire.lock
      - name: Pytest
        run: uv run pytest -q
      - name: Dump dev stack logs on failure
        if: failure()
        run: docker compose -f compose.dev.yaml logs --no-color --tail=200

  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Toolchain
        run: rustup component add rustfmt clippy
      # Cache the cargo registry + build artifacts keyed on the lockfiles + rustc
      # so a run recompiles only what changed, not the whole dependency tree from
      # scratch (the dominant cost of this job).
      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            cli
            packages/aci-protocol/generated/rust
      # The release-coupled versions (cli/Cargo.toml, Chart.yaml version +
      # appVersion) must agree on every PR, so a bump that forgets one field
      # fails here rather than shipping a chart that pulls the wrong image (#489).
      - name: Version consistency
        working-directory: ${{ github.workspace }}
        run: bash scripts/check-version-consistency.sh
      - name: Fmt
        run: cargo fmt --check
      # --locked on every resolving cargo command asserts the committed
      # Cargo.lock (both cli/ and the generated ACI crate) already satisfies its
      # Cargo.toml -- cargo errors instead of silently updating the lock, which
      # is the lockfile-freshness gate for Rust (mirrors uv lock --check above).
      - name: Clippy
        run: cargo clippy --locked -- -D warnings
      - name: Test
        run: cargo test --locked
      - name: Generated ACI protocol crate compiles
        working-directory: packages/aci-protocol/generated/rust
        run: cargo test --locked

  # The release binary the e2e ladder + falsifiability gate consume, split out of
  # the quality job above so those downstream jobs start as soon as the binary
  # COMPILES -- in parallel with fmt/clippy/test rather than after them (they no
  # longer gate the ladder; a real test/clippy failure still blocks the merge via
  # the required "Rust (fmt + clippy + test)" check). The release-build compile
  # check now lives here; if it should stay merge-blocking, add this job ("Build
  # the agentos release binary") to the branch ruleset's required checks (today
  # the required set is Compose/Contracts/Python/Rust/UI). Cached independently.
  rust-build:
    name: Build the agentos release binary
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Toolchain
        run: rustc --version
      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - name: Release build
        run: cargo build --release --locked
      - name: Upload agentos binary
        uses: actions/upload-artifact@v7
        with:
          name: agentos-x86_64-linux-${{ github.sha }}
          path: cli/target/release/agentos
          if-no-files-found: error

  contracts-ts:
    name: Contracts (generated TypeScript compiles)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
      - name: Regenerate TypeScript from the committed schema and check for drift
        run: |
          npx --yes json-schema-to-typescript@15.0.4 \
            packages/aci-protocol/schema/aci-protocol.schema.json \
            --unreachableDefinitions \
            -o packages/aci-protocol/generated/ts/aci-protocol.ts
          git diff --exit-code -- packages/aci-protocol/generated/ts/aci-protocol.ts
      - name: tsc --noEmit on generated ACI types
        run: npx --yes -p typescript@5.9.3 tsc --noEmit -p packages/aci-protocol/generated/ts/tsconfig.json

  ui:
    name: UI (lint + vitest + build + Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ui
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9
      - name: Install Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: apps/ui/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Command manifest is current
        # The committed src/generated/commandManifest.ts must match what
        # cli/command-manifest.json regenerates (the UI Docker build has no
        # cli/, so the manifest is committed, not built there). Fail on drift.
        run: |
          pnpm gen:manifest
          git diff --exit-code src/generated/commandManifest.ts \
            || (echo "commandManifest.ts is stale; run 'pnpm gen:manifest' in apps/ui and commit." && exit 1)
      - name: Lint
        run: pnpm lint
      - name: Unit tests (vitest)
        run: pnpm test
      - name: Build
        run: pnpm build
      - name: Install Playwright chromium
        run: pnpm exec playwright install --with-deps chromium
      # The stackless E2E project (route-interception fixtures, testIgnore
      # integration) runs with no backend; the live-backend "integration" project
      # only activates under PW_INTEGRATION=1, which CI does not set. Playwright's
      # webServer builds and serves the preview for the run.
      - name: E2E (Playwright, stackless)
        run: pnpm exec playwright test

  compose:
    name: Compose (release stack validates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Generate the release compose
        run: python3 compose/generate_release_compose.py > compose.release.yaml
      # compose.release.yaml is generated from compose.dev.yaml (the single
      # source of truth) by compose/generate_release_compose.py; the release
      # asset itself has no other CI coverage. Validate the generated stack
      # parses with the Slack profile off (default: the
      # optional dispatcher is absent) and on (dispatcher rendered), and assert
      # the profile actually gates the service, so the #111 opt-in cannot silently
      # break the default zero-Slack `agentos local up`.
      - name: Default profile parses and omits the dispatcher
        run: |
          docker compose -f compose.release.yaml config -q
          if docker compose -f compose.release.yaml config --services | grep -qx agentos-dispatcher; then
            echo "agentos-dispatcher must NOT be present without the slack profile" >&2
            exit 1
          fi
      - name: Slack profile parses and includes the dispatcher
        run: |
          export SLACK_APP_TOKEN=xapp-ci SLACK_BOT_TOKEN=xoxb-ci
          # The dispatcher depends on valkey (a core service), so the slack
          # profile is paired with a base profile; the CLI does the same.
          docker compose -f compose.release.yaml --profile full --profile slack config -q
          docker compose -f compose.release.yaml --profile full --profile slack config --services \
            | grep -qx agentos-dispatcher \
            || { echo "agentos-dispatcher must be present under the slack profile" >&2; exit 1; }
      # `agentos local up --minimal` selects the `core` profile and plain
      # `agentos local up` the `full` profile; assert the release stack renders
      # exactly those service counts so a profile regression cannot silently
      # start the wrong set.
      - name: Core profile renders 7 services
        run: |
          count=$(docker compose -f compose.release.yaml --profile core config --services | wc -l)
          [ "$count" -eq 7 ] || { echo "core profile must render 7 services, got $count" >&2; exit 1; }
      - name: Full profile renders 12 services
        run: |
          count=$(docker compose -f compose.release.yaml --profile full config --services | wc -l)
          [ "$count" -eq 12 ] || { echo "full profile must render 12 services, got $count" >&2; exit 1; }

  # Build the first-party images on every PR/push -- build only, never push --
  # so a Dockerfile break is caught here instead of only at release time. This
  # mirrors release.yaml's build step (same contexts, same pinned actions, same
  # gha layer cache) minus the registry login and push. All five app images
  # build from public bases (python/node/nginx), so no GHCR credentials are
  # needed; the worker-local overlay is handled separately below.
  images:
    name: Build ${{ matrix.name }} image (no push)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: runner
            dockerfile: runner/Dockerfile
          - name: api
            dockerfile: apps/api/Dockerfile
          - name: dispatcher
            dockerfile: apps/dispatcher/Dockerfile
          - name: worker
            dockerfile: apps/worker/Dockerfile
          - name: ui
            dockerfile: apps/ui/Dockerfile
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build (no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # The worker-local overlay is FROM the published agentos-worker image, so it
  # cannot be built purely from the checkout. Build the base worker image
  # locally first and tag it exactly as the overlay's FROM ref, then build the
  # overlay against it. Plain `docker build` uses the default buildx builder
  # (docker driver), whose FROM lookup consults the local image store -- so the
  # overlay resolves the just-built base with no GHCR pull, no registry auth,
  # and works on any branch (including forks). Build only, never pushed.
  worker-local-image:
    name: Build worker-local overlay image (no push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Build the base worker image locally
        run: docker build -t ghcr.io/curie-eng/agentos-worker:ci-local -f apps/worker/Dockerfile .
      - name: Build the worker-local overlay (no push)
        run: docker build --build-arg BASE_TAG=ci-local -f compose/worker-local.Dockerfile compose

  # The dispatcher image builds with `uv sync --no-editable`, so it installs
  # only the package's DECLARED dependencies. aci-protocol is a uv workspace
  # member imported by handlers.py/queue.py; if it is not declared in
  # apps/dispatcher/pyproject.toml it stays importable from a source checkout
  # but is absent from the isolated image venv, and the process crash-loops on
  # startup (issue #428). The build-only `images` job above cannot catch this
  # (it never runs the image). Build the real image and assert the entrypoint's
  # imports resolve inside it -- the one place that gap is observable.
  dispatcher-image-smoke:
    name: Dispatcher image imports resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Build the dispatcher image locally
        run: docker build -t agentos-dispatcher:ci-smoke -f apps/dispatcher/Dockerfile .
      - name: Entrypoint imports resolve in the built image
        run: docker run --rm --entrypoint python agentos-dispatcher:ci-smoke -c "import agentos_dispatcher; import aci_protocol"

  # FALSIFIABILITY gate for the committed eval suites (issue #619). This is NOT
  # an E2E test: it never runs a real agent or makes a model call. It boots the
  # runner's scripted FAKE model (offline, no credential, no network) -- a
  # do-nothing agent whose only reply is the canned "all done" -- and runs every
  # committed eval suite (examples/*/evals/cases.json + the init scaffold seed at
  # apps/worker/schema/eval-cases.example.json) through the real `agentos skill
  # eval` path, failing if ANY case passes. A case that greens against a
  # responder that calls no tool and ignores the input is unfalsifiable (#527),
  # which is exactly what this gate forbids reaching main. Suites are discovered,
  # not hardcoded, so a new suite needs no edit here. The input-parrot
  # vacuousness control (the `contains: "weather"` class) and the positive
  # control (each grader greens on a known-good exemplar) are grader-level and
  # ride the Rust job (cli/tests/eval_falsifiability.rs) -- the fake model can
  # only ever say "all done", so those cannot be expressed through this path.
  # Reuses the release binary the Rust job already built and uploaded, and builds
  # the runner image locally (plain `docker build`, no registry auth).
  eval-falsifiability:
    name: Eval falsifiability gate (fake model, offline)
    runs-on: ubuntu-latest
    needs: rust-build
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Download the agentos binary built by the Rust job
        uses: actions/download-artifact@v7
        with:
          name: agentos-x86_64-linux-${{ github.sha }}
          path: cli/target/release
      - name: Make the binary executable
        run: chmod +x cli/target/release/agentos
      - name: Build the runner image locally
        run: docker build -t agentos-runner -f runner/Dockerfile .
      - name: Falsifiability gate (every committed case must go RED against the fake model)
        env:
          AGENTOS_BIN: cli/target/release/agentos
        run: bash cli/scripts/eval-falsifiability.sh

  # COLD-START PARITY LADDER (issue #690), skill + local rungs only. A
  # meta-analysis of all 41 bug issues filed against this repo found roughly
  # 18 were caught ONLY by a manual cold-start dogfood run and never surfaced
  # by unit tests, review, or existing CI -- whole classes of bug had no
  # lower-tier signal at all: compose env wiring (#545), profile asymmetry
  # (#233, #342), deploy-then-message reachability (#352, #359), and
  # fake/live model defaults (#343). The ladder drives the real `agentos`
  # verbs end to end (rung 1: the skill-tier `e2e.sh`; rung 2: `local
  # up --minimal` -> `local deploy` -> `local message` with the reply
  # asserted -> `local down`) against a real runner container, sealed with
  # the fake model, so this class of bug fails CI instead of surviving to
  # the next manual dogfood pass.
  #
  # The cluster rung is NOT run by THIS job (it stays skill + local +
  # local-release, credential-free with no cluster). It is now covered by the
  # separate `e2e-ladder-cluster` job below (issue #692), which stands up a
  # disposable kind cluster, Helm-installs the platform through `agentos cluster
  # up`, brings up the runner prewarm DaemonSet, and gates the same
  # deploy-then-message round trip -- with the bidirectional reachability the
  # rung needs (in-cluster worker -> host-bound reply stub). Keep the two jobs
  # split: this one must stay cluster-free and fast, so a kind/Helm flake can
  # never red the skill/local signal.
  #
  # Rung 2 brings up the `core` compose profile for real, unlike the Python
  # job above (which never starts agentos-api/worker to dodge private-registry
  # pulls). `agentos-api` and `agentos-migrate` pull
  # `ghcr.io/curie-eng/agentos-api:${AGENTOS_BASE_TAG:-latest}`, a private GHCR
  # image this workflow has no credentials for, so it is built locally first and
  # tagged to match. `agentos-worker` builds from source at `up` time via
  # compose/worker-local.Dockerfile, whose own FROM is
  # `ghcr.io/curie-eng/agentos-worker:${BASE_TAG}` (default `latest`), another
  # private pull one layer down -- compose.dev.yaml threads the same
  # AGENTOS_BASE_TAG through as that build stanza's BASE_TAG arg (issue #698),
  # so one override variable drives all three. This job sets AGENTOS_BASE_TAG=
  # ci-local (the same convention the `worker-local-image` job above already
  # uses for its own base build) and tags its from-source builds to match,
  # rather than retagging over whatever `:latest` meant in the local image
  # store before this job ran -- `:latest` is not shadowed. Both builds are
  # throwaway (this runner's Docker daemon is discarded at job end; nothing
  # here is ever pushed).
  #
  # Rung 2's worker spawns sibling runner containers through the mounted
  # Docker socket (network_mode: host, AGENTOS_SANDBOX_SUBSTRATE=docker); the
  # runner image it spawns must already exist on the host daemon, which it
  # does once the `agentos-runner` build below completes. GitHub-hosted
  # runners support Docker-in-Docker this way, but this is confirmed by the
  # first green live run of this job in CI, not asserted from first
  # principles -- if that first run does not go green, treat the
  # docker-socket path as unverified rather than assuming the theory above is
  # right.
  #
  # A third private-image seam, easy to miss because it is not a compose
  # `image:` pull: compose.dev.yaml sets AGENTOS_RUNNER_IMAGE=
  # ghcr.io/curie-eng/agentos-runner:latest on the worker service, and
  # apps/worker/src/agentos_worker/run.py reads that env var (falling back to
  # bare `agentos-runner` only when it is unset) to name the image it spawns
  # per message. Rung 1 (skill) and the CLI's own dev-build default both use
  # the bare `agentos-runner` tag the build step below produces, but rung 2's
  # worker asks for the ghcr.io-qualified tag instead. Retag the same local
  # build under both names rather than building twice, so one rung's image
  # choice cannot silently break the other.
  #
  # Reuses the release binary the Rust job already built and uploaded. The
  # local rung needs a working Docker daemon for `docker compose`;
  # ubuntu-latest ships one, the same assumption the `compose` job above
  # already relies on. `AGENTOS_E2E_TIERS` and `AGENTOS_E2E_LIVE` are left
  # unset, so the script's own defaults apply: skill + local rungs, fake
  # model, credential-free. Expect this to be the slowest job in the
  # workflow -- three image builds (runner, api, worker base) plus one more
  # (the worker-local overlay) that compose triggers itself, on top of the
  # actual up/deploy/message/down round trip; `local up --wait` alone can run
  # up to compose's 300s default wait timeout if a service is slow to report
  # healthy.
  #
  # Additive on top of the above: a `local-release` rung (issue #695) runs the
  # SAME local round trip again, this time against compose/generate_release_compose.py's
  # OUTPUT (compose.release.yaml) instead of the checked-in compose.dev.yaml --
  # the artifact a release binary's `agentos local up` actually runs. The
  # `compose` job elsewhere in this workflow already asserts that generated
  # file parses and renders the right service counts; it never runs a turn
  # through it, which is exactly the gap #545-class compose-env-wiring bugs
  # hide in. Reuses the SAME agentos-api/agentos-worker local builds above
  # (no second Dockerfile build for those), just tags/builds the two additional
  # refs the DEFAULT (no --version) generation pins: agentos-api:latest (the
  # dev file's own unset-override outcome) and the worker-local overlay image
  # the generator's T1 substitutes for the build directive, both resolved
  # locally so `local up` never attempts a pull against a private GHCR ref.
  #
  # All three image builds here use plain `docker build`, not buildx: two of
  # the tags are consumed as Dockerfile FROM bases by a compose-triggered build
  # later in the same job, and a docker-container buildx builder set as the
  # default (as docker/setup-buildx-action does) breaks that FROM resolution.
  # See the build steps' own comment for the full history (#697/#791).
  e2e-ladder:
    name: E2E parity ladder (skill + local + local-release, fake model)
    runs-on: ubuntu-latest
    needs: [rust-build, changes]
    # Skip on PRs that can't affect what the ladder tests (docs, UI-only, gtools,
    # non-ladder CI). Not a required check, so skipping never blocks a merge; it
    # just stops paying the ~2min image-build + rung cost when nothing it
    # exercises changed. Always runs on push to main (the changes job forces it).
    if: needs.changes.outputs.ladder == 'true'
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Download the agentos binary built by the Rust job
        uses: actions/download-artifact@v7
        with:
          name: agentos-x86_64-linux-${{ github.sha }}
          path: cli/target/release
      - name: Make the binary executable
        run: chmod +x cli/target/release/agentos
      # Plain `docker build`, NOT `docker buildx build`, for all three images
      # below. Two of them (agentos-worker:ci-local, agentos-api:ci-local) are
      # consumed as Dockerfile FROM bases by a build that `docker compose`
      # triggers itself a few steps down (agentos-worker's service build via
      # compose/worker-local.Dockerfile, inside `agentos local up`). #697 changed
      # these to `docker buildx build --load` with a docker/setup-buildx-action
      # step to share the `images` job's GHA layer cache; that made the
      # setup-buildx-action's docker-container builder the default, and the later
      # compose-triggered build then inherited it and could no longer resolve the
      # locally-built `:ci-local` tags as a FROM ("failed to resolve source
      # metadata ... not found"), reddening this job on every run since #791
      # merged. Reverting to the pre-#697 plain-`docker build` shape (no buildx,
      # no setup-buildx-action) is the known-good state: images land in the
      # daemon store and the compose build, using that same daemon, resolves them.
      # The GHA-cache speedup from #697 is the right idea but needs a mechanism
      # that does not repoint the default builder underneath the compose build;
      # correctness first.
      - name: Build the runner image locally
        run: docker build -t agentos-runner -f runner/Dockerfile .
      - name: Retag the runner image for the compose worker (AGENTOS_RUNNER_IMAGE, no registry auth)
        run: docker tag agentos-runner ghcr.io/curie-eng/agentos-runner:latest
      # Tagged :ci-local (the worker-local-image job's own convention), not
      # :latest -- compose.dev.yaml's AGENTOS_BASE_TAG override (set below) points
      # agentos-api/agentos-migrate's `image:` and the worker-local overlay's
      # BASE_TAG build arg at this tag directly, so this job no longer needs to
      # retag its from-source builds over whatever `:latest` meant in the local
      # Docker image store before this job ran.
      - name: Build the api image locally (satisfies agentos-api + agentos-migrate, no registry auth)
        run: docker build -t ghcr.io/curie-eng/agentos-api:ci-local -f apps/api/Dockerfile .
      - name: Build the worker base image locally (satisfies the worker-local overlay's FROM, no registry auth)
        run: docker build -t ghcr.io/curie-eng/agentos-worker:ci-local -f apps/worker/Dockerfile .
      - name: Parity ladder (skill + local rungs, fake model, credential-free)
        env:
          AGENTOS_BIN: cli/target/release/agentos
          AGENTOS_BASE_TAG: ci-local
        run: bash cli/scripts/e2e-ladder.sh
      - name: Tag the api image for the generated release compose (ghcr.io/curie-eng/agentos-api:latest, no registry auth)
        run: docker tag ghcr.io/curie-eng/agentos-api:ci-local ghcr.io/curie-eng/agentos-api:latest
      - name: Build the worker-local overlay for the generated release compose (ghcr.io/curie-eng/agentos-worker-local:latest, no registry auth)
        run: docker build --build-arg BASE_TAG=ci-local -t ghcr.io/curie-eng/agentos-worker-local:latest -f compose/worker-local.Dockerfile compose
      - name: Parity ladder (local-release rung against generated compose.release.yaml, fake model, credential-free)
        env:
          AGENTOS_BIN: cli/target/release/agentos
          AGENTOS_E2E_TIERS: local-release
        run: bash cli/scripts/e2e-ladder.sh

  # COLD-START PARITY LADDER -- CLUSTER RUNG (issue #692). The one rung the
  # credential-free `e2e-ladder` job above deliberately does not run: the
  # deploy-then-message round trip against a real Helm-installed release on
  # Kubernetes. Deploy-then-message reachability (#352, #359) is one of the bug
  # classes the ladder exists to catch, and until this job existed it was the
  # only rung CI never gated -- verified by hand against a dev cluster before a
  # release. This stands up a DISPOSABLE kind cluster (thrown away with the
  # runner at job end), Helm-installs the platform through `agentos cluster up`
  # (the operator wrapper, so the install path itself is exercised, not a
  # bespoke helm line), brings the runner prewarm DaemonSet up, and runs the
  # cluster rung of `cli/scripts/e2e-ladder.sh` (AGENTOS_E2E_TIERS=cluster).
  #
  # THE REACHABILITY CRUX (why this rung was cut from #690 and needs its own
  # job): the round trip is bidirectional. Host->cluster is easy -- `cluster
  # deploy`/`cluster message` self-plumb kubectl port-forwards and read the
  # release's UI `/api` NodePort. The hard leg is POD->HOST: the in-cluster
  # worker must POST its reply back to the host-bound Slack stub that `cluster
  # message` binds on 0.0.0.0:8155 on THIS runner. `cluster message`
  # auto-detects the host to advertise from the kubeconfig API-server address,
  # but a kind cluster's API server is bound on loopback (127.0.0.1:<port>), so
  # auto-detection yields 127.0.0.1 -- which an in-cluster pod cannot route to.
  # So the ladder is told the pod-reachable host explicitly via
  # AGENTOS_E2E_LISTEN_HOST (forwarded to `cluster message --listen-host`, the
  # documented operator escape hatch every loopback-API cluster needs): the kind
  # Docker network gateway -- the host's own address on the bridge every kind
  # node container sits on, which those containers (and pods egressing through
  # them) can always reach. The stub binds 0.0.0.0, so it answers on that bridge
  # address too. The UI NodePort (30080) is mapped to the host by the kind config
  # so `cluster deploy`'s NodePort discovery (which resolves the loopback
  # kubeconfig host) reaches the API through the UI proxy.
  #
  # Images: the four the cluster path needs (api, worker, ui, runner) are built
  # locally and `kind load`ed into the node store, then the install overrides
  # each image to the loaded tag with pullPolicy Never (mirroring
  # charts/agentos/values-dev.yaml's offline posture) so the cluster never
  # reaches for the private GHCR refs it has no credentials for. The dispatcher
  # is NOT deployed -- no Slack ingress is needed, and a `<release>-dispatcher`
  # Deployment would trip `cluster message`'s guard against hijacking a live
  # workspace's replies. gVisor is forced off (kind nodes have no runsc). The
  # install is sealed with the fake model, so the whole rung stays
  # credential-free like the rest of the ladder.
  #
  # GitHub-hosted Docker-in-Docker + kind is confirmed by the first green run of
  # this job, not asserted from first principles (same posture as the
  # `e2e-ladder` job's docker-socket note): if the first run does not go green,
  # treat the kind/reachability path as unverified rather than assuming the
  # theory above is right. Kept a SEPARATE job from `e2e-ladder` on purpose: the
  # skill/local signal must never be reddened by a kind or Helm flake.
  # Gate the expensive e2e parity ladder rungs so they run ONLY when a change
  # could affect the build/deploy/message path any rung exercises (charts / cli /
  # app+runner images / the ACI wire / this workflow), and always on push to
  # main. An unrelated PR (docs, UI-only, gtools, etc.) skips every ladder rung
  # entirely -- the ladder's image builds + rungs are ~2min it need not pay when
  # nothing it tests changed. Pure git-diff, no third-party action. (No ladder
  # rung is a required check anyway -- the ruleset requires only
  # Compose/Contracts/Python/Rust/UI -- so this only trims wasted runs, never
  # blocks a merge.)
  changes:
    name: Detect ladder-relevant changes
    runs-on: ubuntu-latest
    outputs:
      ladder: ${{ steps.filter.outputs.ladder }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 0
      - id: filter
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "ladder=true" >> "$GITHUB_OUTPUT"   # post-merge gate on main
            exit 0
          fi
          base="${{ github.base_ref }}"
          git fetch --quiet origin "$base"
          if git diff --name-only "origin/$base...HEAD" \
              | grep -qE '^(charts/|cli/|apps/|runner/|packages/aci-protocol/|\.github/workflows/ci\.yaml)'; then
            echo "ladder=true" >> "$GITHUB_OUTPUT"
          else
            echo "ladder=false" >> "$GITHUB_OUTPUT"
          fi

  e2e-ladder-cluster:
    name: E2E parity ladder (cluster rung on kind, fake model)
    runs-on: ubuntu-latest
    needs: [rust-build, changes]
    if: needs.changes.outputs.ladder == 'true'
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Download the agentos binary built by the Rust job
        uses: actions/download-artifact@v7
        with:
          name: agentos-x86_64-linux-${{ github.sha }}
          path: cli/target/release
      - name: Make the binary executable
        run: chmod +x cli/target/release/agentos
      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.16.4
      # Plain `docker build` (not buildx) for the same reason the `e2e-ladder`
      # job documents: keep the images in the local daemon store so `kind load`
      # picks them up with no registry round trip. Only the four images the
      # cluster round trip actually needs; the dispatcher is not deployed.
      - name: Build the api image locally
        run: docker build -t agentos-api:local -f apps/api/Dockerfile .
      - name: Build the worker image locally
        run: docker build -t agentos-worker:local -f apps/worker/Dockerfile .
      - name: Build the ui image locally
        run: docker build -t agentos-ui:local -f apps/ui/Dockerfile .
      - name: Build the runner image locally
        run: docker build -t agentos-runner:latest -f runner/Dockerfile .
      # kind config: map the UI NodePort (chart default 30080) to the host so
      # `cluster deploy`'s UI `/api` NodePort discovery -- which resolves the
      # loopback kubeconfig host (127.0.0.1) -- reaches the in-cluster API.
      - name: Write the kind cluster config
        run: |
          cat > kind-config.yaml <<'EOF'
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
            - role: control-plane
              extraPortMappings:
                - containerPort: 30080
                  hostPort: 30080
                  listenAddress: "127.0.0.1"
                  protocol: TCP
          EOF
      # Disposable kind cluster. Pins both the action and the kind/node-image
      # versions. The `kind` Docker network (created here) is the bridge every
      # node container sits on; its gateway is the host address the in-cluster
      # worker reaches the reply stub through, resolved below.
      - name: Create the kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          version: v0.24.0
          node_image: kindest/node:v1.31.0
          cluster_name: agentos-e2e
          config: kind-config.yaml
      # Load the four locally-built images into the node store so the install's
      # pullPolicy Never overrides bind them with no registry pull.
      - name: Load images into the kind cluster
        run: |
          set -euo pipefail
          for img in agentos-api:local agentos-worker:local agentos-ui:local agentos-runner:latest; do
            kind load docker-image "$img" --name agentos-e2e
          done
      # Helm-install the platform through the operator wrapper. --dev pins the
      # chart's deterministic published secrets (so `cluster message` can read
      # them back); --fake-model seals the install credential-free. The --set
      # overrides repoint every first-party image at the just-loaded local tags
      # with pullPolicy Never (the runner AND its prewarm DaemonSet), force gVisor
      # off (no runsc on kind nodes), and drop the dispatcher (no Slack; its
      # presence would trip the `cluster message` reply-hijack guard).
      - name: Install the platform (agentos cluster up)
        env:
          AGENTOS_BIN: cli/target/release/agentos
        run: |
          set -euo pipefail
          "$AGENTOS_BIN" cluster up \
            --chart charts/agentos \
            --dev \
            --fake-model \
            --set security.gvisor.mode=off \
            --set dispatcher.deploy=false \
            --set api.image.repository=agentos-api --set api.image.tag=local --set api.image.pullPolicy=Never \
            --set worker.image.repository=agentos-worker --set worker.image.tag=local --set worker.image.pullPolicy=Never \
            --set ui.image.repository=agentos-ui --set ui.image.tag=local --set ui.image.pullPolicy=Never \
            --set agentSandbox.runner.image=agentos-runner --set agentSandbox.runner.tag=latest --set agentSandbox.runner.imagePullPolicy=Never \
            --set agentSandbox.runner.prewarm.imagePullPolicy=Never
      # `cluster up` does not `helm --wait` (the argv stays a thin wrapper), so
      # wait for the rollouts the round trip depends on before driving it. The
      # controller-ready preflight already gated the agent-sandbox controller
      # during install; these cover the app tier and the prewarm cache. Langfuse
      # and ClickHouse are intentionally NOT waited on -- a fake-model turn does
      # not need traces to have flushed, and they are the slowest pods to settle.
      - name: Wait for the platform to become ready
        run: |
          set -euo pipefail
          kubectl rollout status deploy/agentos-api -n agentos --timeout=300s
          kubectl rollout status deploy/agentos-worker -n agentos --timeout=300s
          kubectl rollout status deploy/agentos-ui -n agentos --timeout=300s
          kubectl rollout status daemonset/agentos-runner-prewarm -n agentos --timeout=300s
      # The pod-reachable host for the reply stub: the kind Docker network
      # gateway. Every node container sits on this bridge, so a pod egressing
      # through its node reaches the host here; the stub binds 0.0.0.0 and answers
      # on it. See this job's header for why auto-detection (loopback API server)
      # cannot produce this value on kind.
      - name: Resolve the pod-reachable host for the reply stub
        run: |
          set -euo pipefail
          # The kind bridge's IPv4 gateway is the host address every node -- and
          # every pod egressing through its node -- can reach; the stub binds
          # 0.0.0.0 and answers on it. The `kind` Docker network is frequently
          # dual-stack, so IPAM.Config carries both an IPv4 and an IPv6 entry in
          # an unspecified order (and an entry may omit Gateway) -- `index 0` is
          # not reliably the IPv4 one, which is why it came back empty. Read the
          # gateway the control-plane node container actually got first, then
          # fall back to ranging the network's IPAM for a dotted-quad gateway.
          node="agentos-e2e-control-plane"
          gw="$(docker inspect "$node" --format '{{ .NetworkSettings.Networks.kind.Gateway }}' 2>/dev/null || true)"
          if [[ ! "$gw" =~ ^[0-9]{1,3}(\.[0-9]{1,3}){3}$ ]]; then
            gw="$(docker network inspect kind \
                    --format '{{range .IPAM.Config}}{{println .Gateway}}{{end}}' 2>/dev/null \
                  | grep -E '^[0-9]{1,3}(\.[0-9]{1,3}){3}$' | head -1 || true)"
          fi
          if [[ ! "$gw" =~ ^[0-9]{1,3}(\.[0-9]{1,3}){3}$ ]]; then
            echo "could not resolve the kind network IPv4 gateway" >&2
            echo "--- docker network inspect kind ---" >&2
            docker network inspect kind >&2 || true
            echo "--- docker inspect $node (.NetworkSettings.Networks) ---" >&2
            docker inspect "$node" --format '{{json .NetworkSettings.Networks}}' >&2 || true
            exit 1
          fi
          echo "kind network gateway (worker->stub reply host): $gw"
          echo "AGENTOS_E2E_LISTEN_HOST=$gw" >> "$GITHUB_ENV"
      # The cluster rung only: `cluster status` gate -> `cluster deploy` ->
      # `cluster message` (reply asserted). Fake model, credential-free.
      - name: Parity ladder (cluster rung, fake model, credential-free)
        env:
          AGENTOS_BIN: cli/target/release/agentos
          AGENTOS_E2E_TIERS: cluster
        run: bash cli/scripts/e2e-ladder.sh
      # Surface why on any failure above: pod states, recent events, and the
      # worker/runner logs are what localize a reachability or scheduling break.
      - name: Dump cluster diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -A -o wide || true
          kubectl get events -n agentos --sort-by=.lastTimestamp | tail -50 || true
          kubectl describe pods -n agentos -l app.kubernetes.io/component=runner-sandbox || true
          kubectl logs -n agentos -l app.kubernetes.io/component=worker --tail=100 || true
