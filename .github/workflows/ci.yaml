name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Sync workspace
        run: uv sync
      - name: Ruff
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy
      - name: Pytest
        run: uv run pytest -q

  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Toolchain
        run: rustup component add rustfmt clippy
      - name: Fmt
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Test
        run: cargo test
      - name: Generated ACI protocol crate compiles
        working-directory: packages/aci-protocol/generated/rust
        run: cargo test
      # Continuously prove the release build (the artifact a cold user downloads)
      # and publish it as a sha-addressable workflow artifact every run.
      - name: Release build
        run: cargo build --release
      - name: Upload agentos binary
        uses: actions/upload-artifact@v4
        with:
          name: agentos-x86_64-linux-${{ github.sha }}
          path: cli/target/release/agentos
          if-no-files-found: error

  contracts-ts:
    name: Contracts (generated TypeScript compiles)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Regenerate TypeScript from the committed schema and check for drift
        run: |
          npx --yes json-schema-to-typescript@15 \
            packages/aci-protocol/schema/aci-protocol.schema.json \
            --unreachableDefinitions --no-additionalProperties=false \
            -o packages/aci-protocol/generated/ts/aci-protocol.ts
          git diff --exit-code -- packages/aci-protocol/generated/ts/aci-protocol.ts
      - name: tsc --noEmit on generated ACI types
        run: npx --yes -p typescript@5 tsc --noEmit -p packages/aci-protocol/generated/ts/tsconfig.json

  ui:
    name: UI (lint + vitest + build + Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ui
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: apps/ui/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Unit tests (vitest)
        run: pnpm test
      - name: Build
        run: pnpm build
      - name: Install Playwright chromium
        run: pnpm exec playwright install --with-deps chromium
      # The stackless E2E project (route-interception fixtures, testIgnore
      # integration) runs with no backend; the live-backend "integration" project
      # only activates under PW_INTEGRATION=1, which CI does not set. Playwright's
      # webServer builds and serves the preview for the run.
      - name: E2E (Playwright, stackless)
        run: pnpm exec playwright test
