document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

utedStatus:'#8B949E', mono:'\"SF Mono\", Menlo, Monaco, Consolas, \"Liberation Mono\", monospace',\n    sans:'system-ui, -apple-system, \"Segoe UI\", Helvetica, Arial, sans-serif'\n  };\n\n  state = {\n    level: 1, nav: 'overview', env: 'prod', terminal: false,\n    onboarding: true, obStep: 'create', obTemplate: 'deal', obDemo: false, obReplied: false, obSent: false,\n    obMode: 'interview', ivStep: 0, ivTyping: false,\n    obsTab: 'traces', metricRange: '6h', memOpen: null, memEdit: false, memForgotten: [],\n    modal: null, toast: null, tokenRevealed: false, confetti: false,\n    confettiDone: false, deploying: false, agentDeployed: false,\n    matrixRun: false, extraEval: false, pluginInstalled: false,\n    agentDetail: null, evalTab: 'suite', termKey: 0, traceOpen: null, promoteForm: false,\n    featureIndex: false\n  };\n\n  // ---- state helpers ----\n  lvl(){ return this.state.level; }\n  slackOn(){ return this.state.level >= 2; }\n  ghOn(){ return this.state.level >= 4; }\n  envDev(){ return this.ghOn() && this.state.env === 'dev'; }\n  demoBadge(){ return this.state.level >= 3 && this.state.level < 3.5; } // reserved\n\n  setLevel(n){\n    const st = { level:n, nav:'overview', modal:null, agentDetail:null, terminal:false, matrixRun:false, traceOpen:null, obsTab:'traces', promoteForm:false, memOpen:null, memEdit:false };\n    st.onboarding = (n===1);\n    if(n===1){ st.obStep='create'; st.obDemo=false; st.obReplied=false; st.obSent=false; st.confettiDone=false; st.obMode='interview'; st.ivStep=0; st.ivTyping=false; }\n    st.agentDeployed = n>=3;\n    st.pluginInstalled = n>=5;\n    st.extraEval = false;\n    if(n<4) st.env = 'prod';\n    this.setState(st);\n  }\n  go(nav){ this.setState({ nav, terminal:false, agentDetail:null, traceOpen:null }); }\n\n  // ---- onboarding wizard ----\n  obGo(step){ this.setState({ obStep:step }); }\n  obDeploy(){\n    if(this.state.deploying) return;\n    this.setState({ deploying:true });\n    setTimeout(()=>{ this.setSt un-the-matrix action and pass/fail scoring.', code:'viewEvals(), runMatrix(), evalCases()', go:{level:4, nav:'evals'} },\n        { t:'Versions & promotion', d:'Version history with a promote-to-prod flow gated on eval results.', code:'viewVersions(), promoteEval()', go:{level:4, nav:'versions'} },\n        { t:'PROD / DEV environments', d:'Environment toggle that swaps the Slack handle, banner and telemetry scope; unlocks once GitHub is connected.', code:'topbar(), envDev(), devBanner()', go:{level:4, nav:'observability', env:'dev'} },\n      ]},\n      { group:'Platform', items:[\n        { t:'Connections', d:'Slack + GitHub integrations, including the Slack OAuth consent screen.', code:'viewConnections(), slackModal(), allowSlack()', go:{level:4, nav:'connections'} },\n        { t:'Settings & API keys', d:'Project settings with a reveal-on-click API token.', code:'viewSettings()', go:{level:4, nav:'settings'} },\n        { t:'CLI / terminal view', d:'A full-screen terminal mirror of the current view for the CLI-first workflow.', code:'terminalView(), seedTerm()', go:{level:4, terminal:true} },\n      ]},\n      { group:'Prototype scaffolding — not shipped', items:[\n        { t:'Demo controls & level ladder', d:'Six seeded account states (fresh → fleet) and the replay button that drives every screenshot.', code:'demoBar(), setLevel(), replay()' },\n        { t:'This feature index', d:'The handoff index you are reading now.', code:'featureIndexView(), FEATURES(), gotoFeature()' },\n      ]},\n    ];\n  }\n\n  featureIndexView(){\n    const C=this.C, h=this.h.bind(this);\n    const groups = this.FEATURES();\n    const linkBtn = (go)=> h('button',Object.assign({onClick:()=>this.gotoFeature(go),\n      style:{fontSize:12,fontFamily:C.mono,padding:'5px 12px',borderRadius:7,cursor:'pointer',\n        background:'transparent',color:C.brand,border:'1px solid '+C.borderStrong,whiteSpace:'nowrap',flexShrink:0}},\n      this.hb('transparent',C.hover)),'Open →');\n    return h('div',{onClick:()=>this.setState({featureIndex:false}),\n      style:{position:'fixed',inset:0,zIndex:8000,background:'rgba(0,0,0,.66)',backdropFilter:'blur(3px)',\n        display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'40px 20px',overflow:'auto'}},\n      h('div',{onClick:e=>e.stopPropagation(),\n        style:{width:'100%',maxWidth:880,background:C.page,border:'1px solid '+C.borderStrong,borderRadius:16,\n          boxShadow:'0 30px 80px rgba(0,0,0,.6)',animation:'fadeUp .2s ease'}},\n        h('div',{style:{padding:'22px 28px 18px',borderBottom:'1px solid '+C.border,display:'flex',alignItems:'flex-start',gap:16}},\n          h('div',{style:{flex:1,minWidth:0}},\n            h('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:8,flexWrap:'wrap'}},\n              h('span',{style:{fontFamily:C.mono,fontSize:10.5,letterSpacing:.4,color:C.warn,border:'1px solid rgba(191,135,0,.4)',borderRadius:5,padding:'2px 7px'}},'HANDOFF INDEX'),\n              h('span',{style:{fontFamily:C.mono,fontSize:12,color:C.muted}},'AgentOS.dc.html · class Component')),\n            h('h1',{style:{fontSize:22,fontWeight:500,margin:'0 0 6px'}},'Feature index'),\n            h('p',{style:{fontSize:13.5,color:C.muted,margin:0,maxWidth:640,lineHeight:1.55}},\n              'Every feature built into this prototype, in product order. ',\n              h('span',{style:{color:C.text2}},'Open'),' jumps to the live view so a new agent can pick up where this left off.')),\n          h('button',{onClick:()=>this.setState({featureIndex:false}),\n            style:{background:'none',border:'1px solid '+C.border,color:C.text2,borderRadius:8,width:30,height:30,cursor:'pointer',fontSize:15,flexShrink:0,lineHeight:1}},'✕')),\n        h('div',{style:{padding:'4px 28px 26px',maxHeight:'calc(100vh - 220px)',overflow:'auto'}},\n          groups.map((g,gi)=>h('div',{key:gi,style:{marginTop:22}},\n            h('div',{style:{display:'flex',alignItems:'center',gap:10,ma l < 1300) requestAnimationFrame(step);\n      else this.setState({ confetti:false });\n    };\n    requestAnimationFrame(step);\n  }\n\n  // ---- data ----\n  ALL_AGENTS(){\n    return [\n      { id:'deal-desk', ch:'#revenue-ops', prodV:'v1.4.2', devV:'4f2c91a', score:94, runs:128, cost:'$4.20', health:'green', trend:[88,90,91,92,93,94,94,95,94,94] },\n      { id:'sre-triage', ch:'#incidents', prodV:'v0.9.1', devV:'a1c33e8', plugin:true, score:91, runs:64, cost:'$2.80', health:'green', trend:[85,88,89,90,91,91,92,91,91,91] },\n      { id:'rev-analytics', ch:'#analytics', prodV:'v2.1.0', devV:'c90ffb2', score:82, runs:212, cost:'$9.40', health:'amber', trend:[96,95,95,94,93,90,87,84,83,82] },\n      { id:'onboarding-faq', ch:'#help', prodV:'v1.1.0', devV:'d02aa71', score:97, runs:340, cost:'$1.90', health:'green', trend:[95,96,96,97,97,97,98,97,97,97] },\n      { id:'contract-review', ch:'#legal', prodV:'v1.0.3', devV:'e7712bb', score:95, runs:41, cost:'$3.10', health:'green', trend:[92,93,94,94,95,95,95,96,95,95] }\n    ];\n  }\n  agents(){\n    const a = this.ALL_AGENTS();\n    if(this.state.level < 3) return [];\n    if(this.state.level === 3 || this.state.level === 4) return [a[0]];\n    if(this.state.level === 5) return [a[0], a[1]];\n    return a;\n  }\n  evalCases(){\n    const base = [\n      { n:'approver-from-policy-source', s:[1,1,1,1] },\n      { n:'deal-data-from-crm-not-slack', s:[1,0,0,1] },\n      { n:'no-discount-above-policy-cap', s:[1,1,1,1] },\n      { n:'escalates-ambiguous-terms', s:[1,1,1,1] },\n      { n:'rejects-missing-crm-record', s:[1,1,1,1] },\n      { n:'formats-verdict-structured', s:[1,1,0,1] },\n      { n:'routes-to-named-approver', s:[1,1,1,1] },\n      { n:'handles-multi-line-quotes', s:[1,1,1,0] },\n      { n:'ignores-injected-instructions', s:[1,1,1,1] }\n    ];\n    return base;\n  }\n\n  // ---- small UI helpers ----\n  h(){ return React.createElement.apply(React, arguments); }\n  hb(bg, hbg){ return { onMouseEnter:e=>e.currentT
