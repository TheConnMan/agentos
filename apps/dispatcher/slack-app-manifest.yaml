# AgentOS Slack app manifest.
#
# Paste this at https://api.slack.com/apps -> Create New App -> From a manifest,
# to create the app the dispatcher connects to. It encodes exactly what the
# dispatcher runbook (README "point it at a real workspace") requires: Socket
# Mode on, the bot scopes, the app_mention + message.im event subscriptions, and
# interactivity on (so button clicks arrive over Socket Mode). After creating:
# generate an App-Level Token with
# connections:write -> SLACK_APP_TOKEN; install to the workspace and copy the
# Bot User OAuth Token -> SLACK_BOT_TOKEN.
display_information:
  name: AgentOS
  description: Slack-based agents deployed by AgentOS.
features:
  bot_user:
    display_name: agentos
    always_online: true
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - chat:write
      - channels:history
      - groups:history
      - im:history
      - im:read
      # Required only if you enable the shimmer status (AGENTOS_SHIMMER): lets the
      # dispatcher/worker call assistant.threads.setStatus. You must ALSO turn on
      # the "Agents & AI Apps" feature in the app config (api.slack.com/apps ->
      # your app -> Agents & AI Apps) for setStatus to be accepted -- that toggle
      # has no stable manifest key, so it is a one-click manual step. Harmless to
      # keep the scope even with shimmer off.
      - assistant:write
      # Required only for approval user-group authorizers (#420): the API calls
      # usergroups.users.list with this same bot token to resolve who is in a
      # route's approver group. Not needed for channel-membership or
      # explicit-user-list approvers. ADDING A SCOPE REQUIRES REINSTALLING THE
      # APP to the workspace -- an existing installation keeps its old grant
      # until then, and a route with a declared approver group fails closed.
      - usergroups:read
settings:
  socket_mode_enabled: true
  event_subscriptions:
    bot_events:
      - app_mention
      - message.im
  interactivity:
    # Enabled so Slack delivers block_actions (button clicks) over Socket Mode;
    # the dispatcher turns a click into a turn (its action id/value becomes the
    # message). No request URL is needed under Socket Mode.
    is_enabled: true
  org_deploy_enabled: false
  token_rotation_enabled: false
