[project]
name = "curie-test-support"
version = "0.0.0"
description = "Curie shared test-support helpers (dev/test only)"
requires-python = ">=3.13"
dependencies = [
    "redis>=5.0",
    "pytest>=8.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/curie_test_support"]
