apiVersion: v2
name: curie
description: >-
  Curie (Relay) umbrella chart. Installs the whole self-hosted stack on a
  single node: Langfuse v3 (web + worker) plus its ClickHouse, Valkey, Postgres,
  and MinIO backing stores, and the OTel Collector that adapts app traces into
  Langfuse. Every backing store is condition-gated with a bring-your-own block,
  and two install-time preflights ship baked in: a CPU-AVX / ClickHouse-pin
  check and a NetworkPolicy-enforcement probe.
type: application
version: 0.4.3
appVersion: "0.4.3"
kubeVersion: ">=1.25.0-0"
maintainers:
  - name: Curie
home: https://github.com/curie-eng/curie
icon: https://raw.githubusercontent.com/curie-eng/curie/main/apps/ui/public/favicon.svg
sources:
  - https://github.com/curie-eng/curie
keywords:
  - curie
  - langfuse
  - agents
  - observability
