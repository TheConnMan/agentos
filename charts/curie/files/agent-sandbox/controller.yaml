# NOTE: This is the upstream kubernetes-sigs/agent-sandbox v0.5.0 controller
# bundle, with two Curie security patches (issues #66 and #350):
#   1. The cluster-wide `networkpolicies` rule has been REMOVED from the
#      agent-sandbox-controller-extensions ClusterRole below. It is replaced by a
#      verb SPLIT in templates/agent-sandbox.yaml (issue #350, ADR-0023): a
#      cluster-scoped read-only ClusterRole grants get/list/watch (which the
#      controller's cluster-scope NetworkPolicy informer needs to sync), while a
#      namespaced Role/RoleBinding grants the mutating verbs
#      create/delete/patch/update (plus get) confined to the release namespace, so
#      a compromised controller SA cannot delete the fail-closed egress policy
#      (Rail 1) in any other namespace.
#   2. The Deployment carries a non-root / read-only-rootfs securityContext.
# Re-vendoring a newer upstream release must re-apply both patches -- including the
# cluster-read + namespaced-mutate split in patch 1.
kind: Namespace
apiVersion: v1
metadata:
  name: agent-sandbox-system
---
kind: ServiceAccount
apiVersion: v1
metadata:
  name: agent-sandbox-controller
  namespace: agent-sandbox-system
  labels:
    app: agent-sandbox-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-sandbox-controller
subjects:
- kind: ServiceAccount
  name: agent-sandbox-controller
  namespace: agent-sandbox-system
roleRef:
  kind: ClusterRole
  name: agent-sandbox-controller
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-sandbox-controller
  namespace: agent-sandbox-system
rules:
- apiGroups:
  - ''
  resources:
  - secrets
  verbs:
  - create
- apiGroups:
  - ''
  resourceNames:
  - agent-sandbox-webhook-certs
  resources:
  - secrets
  verbs:
  - get
  - patch
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-sandbox-controller
  namespace: agent-sandbox-system
subjects:
- kind: ServiceAccount
  name: agent-sandbox-controller
  namespace: agent-sandbox-system
roleRef:
  kind: Role
  name: agent-sandbox-controller
  apiGroup: rbac.authorization.k8s.io
---
kind: Service
apiVersion: v1
metadata:
  name: agent-sandbox-controller
  namespace: agent-sandbox-system
  labels:
    app: agent-sandbox-controller
spec:
  selector:
    app: agent-sandbox-controller
  ports:
  - name: metrics
    port: 8080
    targetPort: metrics
    protocol: TCP
---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: agent-sandbox-controller
  namespace: agent-sandbox-system
  labels:
    app: agent-sandbox-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-sandbox-controller
  template:
    metadata:
      labels:
        app: agent-sandbox-controller
    spec:
      serviceAccountName: agent-sandbox-controller
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: agent-sandbox-controller
        image: registry.k8s.io/agent-sandbox/agent-sandbox-controller:v0.5.0
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        args:
        - --leader-elect=true
        - --extensions
        ports:
        - name: metrics
          containerPort: 8080
          protocol: TCP
        - name: healthz
          containerPort: 8081
          protocol: TCP
        volumeMounts:
        - name: config-volume
          mountPath: /etc/sandbox-config
          readOnly: true
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: config-volume
        configMap:
          name: agent-sandbox-config
          optional: true
      - name: tmp
        emptyDir: {}
---
kind: Service
apiVersion: v1
metadata:
  name: agent-sandbox-webhook-service
  namespace: agent-sandbox-system
spec:
  selector:
    app: agent-sandbox-controller
  ports:
  - name: webhook
    port: 443
    targetPort: 9443
    protocol: TCP
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-sandbox-controller
rules:
- apiGroups:
  - ''
  resources:
  - persistentvolumeclaims
  - pods
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - agents.x-k8s.io
  resources:
  - sandboxes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - agents.x-k8s.io
  resources:
  - sandboxes/finalizers
  - sandboxes/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - apiextensions.k8s.io
  resourceNames:
  - sandboxclaims.extensions.agents.x-k8s.io
  - sandboxes.agents.x-k8s.io
  - sandboxtemplates.extensions.agents.x-k8s.io
  - sandboxwarmpools.extensions.agents.x-k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - events.k8s.io
  resources:
  - events
  verbs:
  - create
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-sandbox-controller-extensions
rules:
- apiGroups:
  - ''
  resources:
  - pods
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ''
  - events.k8s.io
  resources:
  - events
  verbs:
  - create
  - patch
  - update
- apiGroups:
  - agents.x-k8s.io
  resources:
  - sandboxes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - extensions.agents.x-k8s.io
  resources:
  - sandboxclaims
  - sandboxtemplates
  - sandboxwarmpools
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - extensions.agents.x-k8s.io
  resources:
  - sandboxclaims/finalizers
  - sandboxclaims/status
  - sandboxtemplates/finalizers
  - sandboxwarmpools/finalizers
  - sandboxwarmpools/status
  verbs:
  - get
  - patch
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-sandbox-controller-extensions
subjects:
- kind: ServiceAccount
  name: agent-sandbox-controller
  namespace: agent-sandbox-system
roleRef:
  kind: ClusterRole
  name: agent-sandbox-controller-extensions
  apiGroup: rbac.authorization.k8s.io
