{{- if .Values.ui.deploy }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "curie.fullname" . }}-ui
  labels:
    {{- include "curie.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  type: {{ .Values.ui.service.type }}
  selector:
    {{- include "curie.selectorLabels" (dict "root" . "component" "ui") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.ui.service.port }}
      # The nginx-unprivileged base listens on 8080 (it cannot bind :80 as
      # non-root); the SPA Dockerfile serves there.
      targetPort: 8080
      {{- if and (eq .Values.ui.service.type "NodePort") .Values.ui.service.nodePort }}
      nodePort: {{ .Values.ui.service.nodePort }}
      {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "curie.fullname" . }}-ui
  labels:
    {{- include "curie.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      {{- include "curie.selectorLabels" (dict "root" . "component" "ui") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "curie.labels" . | nindent 8 }}
        {{- include "curie.selectorLabels" (dict "root" . "component" "ui") | nindent 8 }}
    spec:
      {{- with .Values.ui.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ui
          image: {{ include "curie.image" (dict "repository" .Values.ui.image.repository "tag" .Values.ui.image.tag "digest" .Values.ui.image.digest "defaultTag" .Chart.AppVersion) | quote }}
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          {{- with .Values.ui.containerSecurityContext }}
          {{- include "curie.containerSecurityContext" . | nindent 10 }}
          {{- end }}
          env:
            # nginx reverse-proxies /api/ to this upstream (the /api prefix is
            # stripped). Points at the in-chart API Service.
            - name: CURIE_API_TARGET
              value: http://{{ include "curie.fullname" . }}-api:{{ .Values.api.service.port }}
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
{{- end }}
