{{- if .Values.postgres.deploy }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "curie.fullname" . }}-postgres
  labels:
    {{- include "curie.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "curie.selectorLabels" (dict "root" . "component" "postgres") | nindent 4 }}
  ports:
    - name: postgres
      port: {{ .Values.postgres.port }}
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "curie.fullname" . }}-postgres
  labels:
    {{- include "curie.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "curie.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "curie.selectorLabels" (dict "root" . "component" "postgres") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "curie.labels" . | nindent 8 }}
        {{- include "curie.selectorLabels" (dict "root" . "component" "postgres") | nindent 8 }}
    spec:
      {{- with .Values.priorityClasses.platform.name }}
      priorityClassName: {{ . }}
      {{- end }}
      securityContext:
        fsGroup: {{ .Values.postgres.podSecurityContext.fsGroup }}
      {{- if not .Values.postgres.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          {{- with .Values.postgres.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.auth.username | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.auth.database | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.existingSecret | default (include "curie.secretName" .) }}
                  key: postgresPassword
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U {{ .Values.postgres.auth.username }}"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U {{ .Values.postgres.auth.username }}"]
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  {{- if .Values.postgres.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.global.storageClass }}
        storageClassName: {{ .Values.global.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.persistence.size }}
  {{- end }}
{{- end }}
