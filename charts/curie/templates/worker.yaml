{{- if .Values.worker.deploy }}
{{- $warmPool := .Values.worker.warmPool | default (printf "%s-runner-pool" (include "curie.fullname" .)) }}
{{- if .Values.worker.serviceAccount.create }}
{{/*
The worker drives the Kubernetes API to claim and manage agent-sandbox custom
resources (the substrate's SandboxClient). It gets a namespaced Role scoped to
exactly the CRD verbs KubernetesSandboxClient uses -- SandboxClaims it
creates/reads/deletes/lists, Sandboxes it reads and patches (suspend/resume) --
and nothing else. RBAC does not require the CRDs to be installed for the Role to
apply, so this is valid even when agentSandbox.deploy is false.
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "curie.fullname" . }}-worker
  labels:
    {{- include "curie.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "curie.fullname" . }}-worker
  labels:
    {{- include "curie.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
rules:
  - apiGroups: ["extensions.agents.x-k8s.io"]
    resources: ["sandboxclaims"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["sandboxes"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "curie.fullname" . }}-worker
  labels:
    {{- include "curie.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "curie.fullname" . }}-worker
subjects:
  - kind: ServiceAccount
    name: {{ include "curie.fullname" . }}-worker
    namespace: {{ .Release.Namespace }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "curie.fullname" . }}-worker
  labels:
    {{- include "curie.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      {{- include "curie.selectorLabels" (dict "root" . "component" "worker") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "curie.labels" . | nindent 8 }}
        {{- include "curie.selectorLabels" (dict "root" . "component" "worker") | nindent 8 }}
    spec:
      {{- if .Values.worker.serviceAccount.create }}
      serviceAccountName: {{ include "curie.fullname" . }}-worker
      {{- end }}
      {{- with .Values.priorityClasses.platform.name }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.worker.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: {{ include "curie.image" (dict "repository" .Values.worker.image.repository "tag" .Values.worker.image.tag "digest" .Values.worker.image.digest "defaultTag" .Chart.AppVersion) | quote }}
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          {{- with .Values.worker.containerSecurityContext }}
          {{- include "curie.containerSecurityContext" . | nindent 10 }}
          {{- end }}
          env:
            {{- include "curie.env.postgres" . | nindent 12 }}
            {{- include "curie.env.valkey" . | nindent 12 }}
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "curie.secretName" . }}
                  key: slackBotToken
            # Substrate wiring: which namespace to claim sandboxes in, the warm
            # pool to claim from, and the ACI port on each claimed sandbox.
            - name: CURIE_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: CURIE_WARM_POOL
              value: {{ $warmPool | quote }}
            - name: CURIE_RUNNER_PORT
              value: {{ .Values.agentSandbox.runner.port | quote }}
            # Heartbeat file the worker's asyncio loop touches each tick; the
            # exec probes below read this same path so template and app cannot
            # drift.
            - name: CURIE_HEARTBEAT_FILE
              value: /tmp/curie-worker.heartbeat
            # How long claim() waits for a cold sandbox to become ready before it
            # gives up. Must stay below the worker's per-thread lock TTL (120s).
            - name: CURIE_CLAIM_TIMEOUT_SECONDS
              value: {{ .Values.worker.claimTimeoutSeconds | quote }}
            # Runner model passthrough: the worker injects these into every claim
            # (fake model needs no credential; a real credential comes from the
            # chart Secret and is only wired when one is configured).
            {{- $claimFakeModel := and .Values.agentSandbox.runner.fakeModel (not .Values.inference.deploy) }}
            - name: CURIE_FAKE_MODEL
              value: {{ ternary "1" "0" $claimFakeModel | quote }}
            {{- if .Values.agentSandbox.runner.credentials }}
            - name: CURIE_CREDENTIALS
              valueFrom:
                secretKeyRef:
                  name: {{ include "curie.secretName" . }}
                  key: agentCredentials
            {{- end }}
            # No-Slack egress routing: when set, the worker's Slack sink posts its
            # placeholder edits at this base URL (the `curie cluster message` CLI stub)
            # instead of real Slack. Empty (the default) leaves the sink on real
            # Slack. Rendered only when non-empty (values-not-templates).
            {{- if .Values.worker.slackApiBaseUrl }}
            - name: SLACK_API_BASE_URL
              value: {{ .Values.worker.slackApiBaseUrl | quote }}
            {{- end }}
            {{- with .Values.worker.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          # No HTTP port on the worker, so an exec probe checks a heartbeat file
          # the asyncio event loop touches each tick. A wedged loop stops
          # touching it -> the file goes stale -> the probe fails -> restart.
          {{- include "curie.heartbeatProbes" . | nindent 10 }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
{{- end }}
