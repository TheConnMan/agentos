# Small-cluster sizing overlay (resources only, NO image overrides).
#
# Carries the same single-node footprint as values-dev.yaml (sized for a ~4 GB /
# 4-core scratch cluster such as an un-resized k8scratch) but WITHOUT values-dev's
# local-image / imagePullPolicy: Never overrides. Layer it on top of a GHCR
# install so the stack fits a small cluster while still pulling published images:
#
#   helm install agentos charts/agentos -n agentos --create-namespace \
#     -f charts/agentos/values-ghcr.yaml \
#     -f charts/agentos/values-demo-small.yaml
#
# On a cluster without runsc, add the no-gvisor overlay LAST:
#     ... -f charts/agentos/values-demo-small.yaml \
#     -f charts/agentos/values-e2e-nogvisor.yaml
#
# It touches only resource requests/limits, persistence sizes, replica-shaping
# knobs, and Node heap flags -- it has no `image:` keys, so it never clobbers the
# GHCR image coordinates from values-ghcr.yaml regardless of overlay order.

langfuse:
  web:
    # Node's default heap cap OOM-crashes the web app under a 1Gi limit; give it
    # room. ~1Gi heap fits comfortably in the 1536Mi container limit.
    nodeOptions: "--max-old-space-size=1024"
    resources:
      requests: { cpu: 150m, memory: 384Mi }
      limits: { cpu: "1", memory: 1536Mi }
  worker:
    nodeOptions: "--max-old-space-size=640"
    resources:
      requests: { cpu: 150m, memory: 384Mi }
      limits: { cpu: "1", memory: 1Gi }

postgres:
  persistence:
    size: 2Gi
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }

valkey:
  persistence:
    size: 1Gi
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { cpu: 250m, memory: 256Mi }

clickhouse:
  # Keep the :24.8 SSE4.2-safe pin (set in values.yaml). Cluster mode off for
  # single-node.
  clusterEnabled: false
  persistence:
    size: 3Gi
  resources:
    requests: { cpu: 200m, memory: 512Mi }
    limits: { cpu: "2", memory: 1536Mi }

minio:
  persistence:
    size: 3Gi
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }

otelCollector:
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { cpu: 250m, memory: 256Mi }
