{{- if .Values.minio.deploy }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentos.fullname" . }}-minio
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "agentos.selectorLabels" (dict "root" . "component" "minio") | nindent 4 }}
  ports:
    - name: s3
      port: {{ .Values.minio.port }}
      targetPort: 9000
    - name: console
      port: {{ .Values.minio.consolePort }}
      targetPort: 9001
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "agentos.fullname" . }}-minio
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "agentos.fullname" . }}-minio
  replicas: 1
  selector:
    matchLabels:
      {{- include "agentos.selectorLabels" (dict "root" . "component" "minio") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agentos.labels" . | nindent 8 }}
        {{- include "agentos.selectorLabels" (dict "root" . "component" "minio") | nindent 8 }}
    spec:
      securityContext:
        fsGroup: 1000
      {{- if not .Values.minio.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
      containers:
        - name: minio
          image: {{ .Values.minio.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              value: {{ .Values.minio.auth.rootUser | quote }}
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.minio.existingSecret | default (include "agentos.secretName" .) }}
                  key: minioRootPassword
          ports:
            - name: s3
              containerPort: 9000
            - name: console
              containerPort: 9001
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml .Values.minio.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
  {{- if .Values.minio.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.global.storageClass }}
        storageClassName: {{ .Values.global.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.minio.persistence.size }}
  {{- end }}
---
{{/* Creates the Langfuse bucket so web/worker never race a missing bucket.
     Post-install/upgrade hook with a retry loop against MinIO readiness. */}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "agentos.fullname" . }}-minio-init
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        {{- include "agentos.selectorLabels" (dict "root" . "component" "minio-init") | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: {{ .Values.minio.mcImage }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: MINIO_ROOT_USER
              value: {{ .Values.minio.auth.rootUser | quote }}
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.minio.existingSecret | default (include "agentos.secretName" .) }}
                  key: minioRootPassword
          command:
            - /bin/sh
            - -c
            - |
              set -e
              endpoint="http://{{ include "agentos.minio.host" . }}:{{ .Values.minio.port }}"
              echo "waiting for MinIO at $endpoint ..."
              for i in $(seq 1 60); do
                if mc alias set local "$endpoint" "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" >/dev/null 2>&1; then
                  break
                fi
                sleep 3
              done
              mc alias set local "$endpoint" "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
              mc mb --ignore-existing local/{{ .Values.minio.bucket }}
              echo "bucket {{ .Values.minio.bucket }} ready"
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 250m, memory: 128Mi }
{{- end }}
