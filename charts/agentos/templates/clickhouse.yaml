{{- if .Values.clickhouse.deploy }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentos.fullname" . }}-clickhouse
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "agentos.selectorLabels" (dict "root" . "component" "clickhouse") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.clickhouse.httpPort }}
      targetPort: 8123
    - name: native
      port: {{ .Values.clickhouse.nativePort }}
      targetPort: 9000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "agentos.fullname" . }}-clickhouse
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "agentos.fullname" . }}-clickhouse
  replicas: 1
  selector:
    matchLabels:
      {{- include "agentos.selectorLabels" (dict "root" . "component" "clickhouse") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agentos.labels" . | nindent 8 }}
        {{- include "agentos.selectorLabels" (dict "root" . "component" "clickhouse") | nindent 8 }}
    spec:
      securityContext:
        fsGroup: {{ .Values.clickhouse.podSecurityContext.fsGroup }}
      {{- if not .Values.clickhouse.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
      containers:
        - name: clickhouse
          # Pinned tag; the AVX preflight validates it against the node's CPU.
          image: "{{ .Values.clickhouse.image.repository }}:{{ .Values.clickhouse.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          {{- with .Values.clickhouse.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: CLICKHOUSE_USER
              value: {{ .Values.clickhouse.auth.username | quote }}
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.clickhouse.existingSecret | default (include "agentos.secretName" .) }}
                  key: clickhousePassword
          ports:
            - name: http
              containerPort: 8123
            - name: native
              containerPort: 9000
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml .Values.clickhouse.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
  {{- if .Values.clickhouse.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.global.storageClass }}
        storageClassName: {{ .Values.global.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.clickhouse.persistence.size }}
  {{- end }}
{{- end }}
