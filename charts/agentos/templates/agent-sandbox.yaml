{{/*
Agent Sandbox substrate (G1): the runner SandboxTemplate and SandboxWarmPool
the worker claims from, plus (optionally) the vendored upstream controller.

- CRDs live in this chart's crds/ directory (Helm installs them before
  templates render, so the CRs below never race their own CRDs).
- The controller bundle is the upstream v0.5.0 release manifests
  (core manifest + extensions overlay: the Deployment runs with --extensions),
  vendored under files/agent-sandbox/ with two AgentOS security patches (#66:
  the networkpolicies RBAC is de-scoped from cluster-wide to the release
  namespace via the Role/RoleBinding below, and the Deployment carries a
  hardened securityContext). Cluster-scoped, one per cluster.
- The SandboxTemplate bakes the generic warm-pod env. Per-session env
  (AGENTOS_HISTORY_REF, AGENTOS_SESSION_ID) is injected per-claim by the
  substrate; envVarsInjectionPolicy Overrides makes that injection win.
- service: true is what gives every claimed sandbox its routable
  .status.serviceFQDN (PT-1: without it no Service is created at all).
*/}}
{{- if .Values.agentSandbox.controller.deploy }}
{{ .Files.Get "files/agent-sandbox/controller.yaml" }}
---
{{/*
Scoped replacement (#66) for the networkpolicies grant removed from the vendored
controller's cluster-wide agent-sandbox-controller-extensions ClusterRole. The
controller manages one NetworkPolicy per Sandbox, and this chart creates all
Sandboxes in the release namespace (the worker's AGENTOS_NAMESPACE is
.Release.Namespace), so a namespaced Role confines that power here: a compromised
controller SA cannot delete the fail-closed egress policy (Rail 1) in any other
namespace. Cross-namespace binding is intentional -- the SA lives in
agent-sandbox-system, the NetworkPolicies it manages live in this namespace.
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-sandbox-controller-networkpolicies
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
rules:
- apiGroups:
  - networking.k8s.io
  resources:
  - networkpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-sandbox-controller-networkpolicies
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: agent-sandbox-controller
  namespace: agent-sandbox-system
roleRef:
  kind: Role
  name: agent-sandbox-controller-networkpolicies
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- if .Values.agentSandbox.deploy }}
{{- $runner := .Values.agentSandbox.runner }}
{{- $bf := $runner.bundleFetch }}
---
apiVersion: extensions.agents.x-k8s.io/v1beta1
kind: SandboxTemplate
metadata:
  name: {{ include "agentos.fullname" . }}-runner
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-sandbox
spec:
  service: true
  envVarsInjectionPolicy: {{ $runner.envVarsInjectionPolicy }}
  podTemplate:
    metadata:
      labels:
        {{- include "agentos.selectorLabels" (dict "root" . "component" "runner-sandbox") | nindent 8 }}
    spec:
      {{- if $runner.serviceAccount.create }}
      serviceAccountName: {{ include "agentos.fullname" . }}-runner
      automountServiceAccountToken: {{ $runner.serviceAccount.automountToken }}
      {{- end }}
      {{- $gvisorClass := include "agentos.gvisor.runtimeClassName" . }}
      {{- if $gvisorClass }}
      # Kernel-isolation RuntimeClass from security.gvisor.mode. In `auto` this is
      # present only when the class was found by lookup at install time; under
      # `helm template`/--dry-run lookup is empty, so it renders the no-gvisor shape.
      # In `auto` with a real (non-fake) model the install is guarded by the blocking
      # gVisor preflight, so a runsc-less real-model install fails closed rather than
      # silently rendering this no-gvisor shape; under `helm template`/--dry-run this
      # still renders without runtimeClassName, but no real install proceeds unprotected.
      runtimeClassName: {{ $gvisorClass }}
      {{- end }}
      {{- if $runner.dnsPolicy }}
      # The agent-sandbox controller injects a public-resolver DNS default
      # (8.8.8.8/1.1.1.1) when the pod template leaves dnsPolicy unset, which
      # cannot resolve in-cluster Service names -- breaking the bundle-fetch
      # init container's reach to the in-chart MinIO and the runner's OTLP
      # export to the in-chart collector. Setting it here wins over that default.
      dnsPolicy: {{ $runner.dnsPolicy }}
      {{- end }}
      {{- with $runner.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if $runner.hardening.enabled }}
      securityContext:
        runAsNonRoot: true
        runAsUser: {{ $runner.hardening.runAsUser }}
        runAsGroup: {{ $runner.hardening.runAsGroup }}
        fsGroup: {{ $runner.hardening.fsGroup }}
        seccompProfile:
          type: RuntimeDefault
      {{- end }}
      {{- if or $bf.enabled $runner.hardening.enabled }}
      volumes:
        {{- if $bf.enabled }}
        # Shared bundle volume: the init pair populates <mountPath>/current, the
        # runner reads it as AGENTOS_PLUGIN_DIR.
        - name: bundles
          emptyDir: {}
        {{- end }}
        {{- if $runner.hardening.enabled }}
        {{- range $i, $p := $runner.hardening.writablePaths }}
        - name: writable-{{ $i }}
          emptyDir: {}
        {{- end }}
        {{- end }}
      {{- end }}
      {{- if $bf.enabled }}
      {{/*
      Bundle provisioning. AGENTOS_BUNDLE_REF is injected per-claim (the
      substrate's Overrides policy); baked empty here so a warm/unbound pod
      no-ops. Split in two because no single stock image carries both an
      authenticated S3 client and archive tools: mc fetches the object,
      busybox extracts it. Fail-closed -- a ref that is set but cannot be
      fetched/extracted fails the pod instead of booting an empty plugin dir.
      Egress to MinIO is opened by the runner NetworkPolicy carve-out.
      */}}
      initContainers:
        - name: bundle-fetch
          image: {{ $bf.fetchImage }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              REF="${AGENTOS_BUNDLE_REF:-}"
              if [ -z "$REF" ]; then
                echo "no AGENTOS_BUNDLE_REF; skipping bundle fetch"
                exit 0
              fi
              export MC_CONFIG_DIR={{ $bf.mountPath }}/.mc
              mc alias set src "$S3_ENDPOINT" "$S3_ACCESS_KEY" "$S3_SECRET_KEY"
              mc cp "src/${BUNDLE_BUCKET}/${REF}" {{ $bf.mountPath }}/.bundle-archive
              echo "fetched bundle '$REF' from ${BUNDLE_BUCKET}"
          env:
            - name: AGENTOS_BUNDLE_REF
              value: ""
            - name: S3_ENDPOINT
              value: http://{{ include "agentos.minio.host" . }}:{{ .Values.minio.port }}
            - name: S3_ACCESS_KEY
              value: {{ .Values.minio.auth.rootUser | quote }}
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.minio.existingSecret | default (include "agentos.secretName" .) }}
                  key: minioRootPassword
            - name: BUNDLE_BUCKET
              value: {{ $bf.bucket | quote }}
          volumeMounts:
            - name: bundles
              mountPath: {{ $bf.mountPath }}
          resources:
            {{- toYaml $runner.resources | nindent 12 }}
        - name: bundle-extract
          image: {{ $bf.extractImage }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              REF="${AGENTOS_BUNDLE_REF:-}"
              DEST={{ $bf.mountPath }}/current
              mkdir -p "$DEST"
              if [ -z "$REF" ]; then
                echo "no AGENTOS_BUNDLE_REF; starting with an empty plugin dir"
                exit 0
              fi
              ARCHIVE={{ $bf.mountPath }}/.bundle-archive
              if [ ! -f "$ARCHIVE" ]; then
                echo "FATAL: ref '$REF' set but no fetched archive present" >&2
                exit 1
              fi
              STAGE={{ $bf.mountPath }}/.stage
              rm -rf "$STAGE"
              mkdir -p "$STAGE"
              case "$REF" in
                *.tar.gz|*.tgz) tar -xzf "$ARCHIVE" -C "$STAGE" ;;
                *.tar)          tar -xf  "$ARCHIVE" -C "$STAGE" ;;
                *.zip)          unzip -o "$ARCHIVE" -d "$STAGE" ;;
                *) echo "FATAL: unsupported bundle extension for '$REF'" >&2; exit 1 ;;
              esac
              # Unwrap a single top-level wrapper dir so the plugin manifest sits
              # at the plugin-dir root, matching the API's bundle_root validation
              # (a `tar czf b.tgz myplugin/` wraps everything in one folder). The
              # runner reads AGENTOS_PLUGIN_DIR expecting the manifest at its root.
              ROOT="$STAGE"
              if [ ! -f "$STAGE/plugin.json" ] && [ ! -f "$STAGE/.claude-plugin/plugin.json" ]; then
                subdir=$(find "$STAGE" -mindepth 1 -maxdepth 1 -type d)
                count=$(printf '%s\n' "$subdir" | grep -c .)
                if [ "$count" = "1" ] && { [ -f "$subdir/plugin.json" ] || [ -f "$subdir/.claude-plugin/plugin.json" ]; }; then
                  ROOT="$subdir"
                fi
              fi
              cp -a "$ROOT"/. "$DEST"/
              rm -rf "$STAGE"
              echo "extracted bundle '$REF' into $DEST"
          env:
            - name: AGENTOS_BUNDLE_REF
              value: ""
          volumeMounts:
            - name: bundles
              mountPath: {{ $bf.mountPath }}
          resources:
            {{- toYaml $runner.resources | nindent 12 }}
      {{- end }}
      containers:
        - name: runner
          image: {{ include "agentos.image" (dict "repository" $runner.image "tag" $runner.tag "digest" $runner.digest "defaultTag" $.Chart.AppVersion) | quote }}
          imagePullPolicy: {{ $runner.imagePullPolicy }}
          {{- if $runner.hardening.enabled }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: [ALL]
          {{- end }}
          ports:
            - name: aci
              containerPort: {{ $runner.port }}
          env:
            {{- if $runner.hardening.enabled }}
            - name: HOME
              value: {{ $runner.hardening.home | quote }}
            {{- end }}
            {{- if and $runner.fakeModel (not .Values.inference.deploy) }}
            - name: AGENTOS_FAKE_MODEL
              value: "1"
            {{- end }}
            {{- if .Values.inference.deploy }}
            # Local inference is baked into the warm template so claims keep the
            # fast bind path while the runner targets the in-cluster endpoint.
            - name: ANTHROPIC_BASE_URL
              value: http://{{ include "agentos.fullname" . }}-inference:{{ .Values.inference.service.port }}
            - name: AGENTOS_MODEL
              value: {{ .Values.inference.model | quote }}
            {{- else if $runner.model }}
            # Default model for real runs, baked into the pod template (not
            # per-claim). Per-claim injection would force a cold create
            # (envVarsInjectionPolicy Overrides), so baking it keeps warm-pool
            # binds fast. Pairs with langfuse.modelPricing so the Cost view is
            # non-zero.
            - name: AGENTOS_MODEL
              value: {{ $runner.model | quote }}
            {{- end }}
            {{- if $runner.credentials }}
            # Warm-pod fallback credential; the worker's per-claim Overrides
            # injection carries the (per-agent) credential on a bound run.
            - name: AGENTOS_CREDENTIALS
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentos.secretName" . }}
                  key: agentCredentials
            {{- end }}
            - name: AGENTOS_PLUGIN_DIR
              value: {{ $runner.pluginDir | quote }}
            # Generic identity for a pre-warmed, not-yet-claimed sandbox; the
            # substrate's resume path overrides it per-claim.
            - name: AGENTOS_SESSION_ID
              value: warm-unbound
            # Stable per-sandbox identity: the sandbox controller names the pod
            # after the Sandbox resource, so the pod name IS the sandbox id.
            - name: AGENTOS_SANDBOX_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: AGENTOS_BUDGET
              value: {{ printf "{\"max_output_tokens_per_run\":%d,\"max_usd_per_day\":%v}" (int $runner.budget.maxOutputTokensPerRun) $runner.budget.maxUsdPerDay | quote }}
            - name: AGENTOS_RUNNER_PORT
              value: {{ $runner.port | quote }}
            {{- if .Values.otelCollector.deploy }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://{{ include "agentos.fullname" . }}-otel-collector:{{ .Values.otelCollector.service.httpPort }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            {{- end }}
            {{- with $runner.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ $runner.port }}
            {{- toYaml $runner.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml $runner.resources | nindent 12 }}
          {{- if or $bf.enabled $runner.hardening.enabled }}
          volumeMounts:
            {{- if $bf.enabled }}
            - name: bundles
              mountPath: {{ $bf.mountPath }}
            {{- end }}
            {{- if $runner.hardening.enabled }}
            {{- range $i, $p := $runner.hardening.writablePaths }}
            - name: writable-{{ $i }}
              mountPath: {{ $p }}
            {{- end }}
            {{- end }}
          {{- end }}
{{/*
The SandboxWarmPool is always rendered whenever the sandbox substrate is
deployed, including at replicas 0. The worker's SandboxClaims reference this
pool by name (spec.warmPoolRef.name); with the object absent every claim fails
Ready=False reason=WarmPoolNotFound and the run times out. replicas 0 means no
pre-warmed pods (claims cold-create sandboxes from the template) -- it must not
mean no pool object. Raise replicas only for a fake-model/dev pool where an
unbound warm pod boots cleanly (a real-model warm pod has no bundle and
crash-loops, and a real claim cold-creates anyway because per-claim env
injection cannot bind a pre-warmed pod, the envVarsInjectionPolicy Overrides
gotcha).
*/}}
---
apiVersion: extensions.agents.x-k8s.io/v1beta1
kind: SandboxWarmPool
metadata:
  name: {{ include "agentos.fullname" . }}-runner-pool
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-sandbox
spec:
  replicas: {{ .Values.agentSandbox.warmPool.replicas }}
  updateStrategy:
    type: {{ .Values.agentSandbox.warmPool.updateStrategy }}
  sandboxTemplateRef:
    name: {{ include "agentos.fullname" . }}-runner
{{- end }}
