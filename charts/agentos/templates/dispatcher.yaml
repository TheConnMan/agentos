{{- if include "agentos.dispatcher.enabled" . }}
{{/*
The dispatcher runs Slack in Socket Mode: it dials Slack outbound over a
websocket, so there is no inbound port and therefore no Service and no HTTP
probe. It deploys only when both Slack tokens are set (see
agentos.dispatcher.enabled); a token-less default install skips it entirely
rather than crash-looping the reconnect supervisor, and NOTES.txt prints the
`helm upgrade` command to connect Slack later.
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentos.fullname" . }}-dispatcher
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
    app.kubernetes.io/component: dispatcher
spec:
  replicas: {{ .Values.dispatcher.replicas }}
  selector:
    matchLabels:
      {{- include "agentos.selectorLabels" (dict "root" . "component" "dispatcher") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agentos.labels" . | nindent 8 }}
        {{- include "agentos.selectorLabels" (dict "root" . "component" "dispatcher") | nindent 8 }}
    spec:
      {{- with .Values.dispatcher.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: dispatcher
          image: {{ include "agentos.image" (dict "repository" .Values.dispatcher.image.repository "tag" .Values.dispatcher.image.tag "digest" .Values.dispatcher.image.digest "defaultTag" .Chart.AppVersion) | quote }}
          imagePullPolicy: {{ .Values.dispatcher.image.pullPolicy }}
          {{- with .Values.dispatcher.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            {{- include "agentos.env.valkey" . | nindent 12 }}
            - name: SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentos.secretName" . }}
                  key: slackAppToken
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentos.secretName" . }}
                  key: slackBotToken
            - name: SLACK_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentos.secretName" . }}
                  key: slackSigningSecret
            {{- include "agentos.env.api" . | nindent 12 }}
            # Heartbeat file a background daemon thread in the dispatcher touches
            # each tick; the exec probes below read this same path so template and
            # app cannot drift.
            - name: AGENTOS_HEARTBEAT_FILE
              value: /tmp/agentos-dispatcher.heartbeat
          # No HTTP port on the dispatcher (Slack Socket Mode is outbound-only),
          # so an exec probe checks a heartbeat file a background daemon thread
          # touches each tick. The dispatcher blocks the main thread in
          # supervisor.run(), so a wedged/hung process stops touching the file ->
          # it goes stale -> the probe fails -> restart.
          {{- include "agentos.heartbeatProbes" . | nindent 10 }}
          resources:
            {{- toYaml .Values.dispatcher.resources | nindent 12 }}
{{- end }}
