{{/*
Per-agent connector-secret Secrets (ADR-0009, #429).

Each agent that needs authed-MCP connector secrets gets its OWN Opaque Secret,
named <fullname>-agent-<agentName>-connector-secrets, holding that agent's named
secret VALUES. Deliberately separate from the shared chart Secret
(`agentos.secretName`) so one agent's connector token is not readable by every
component, and never placed on the value-only SandboxClaim CR: the runner
sandbox reads a value via a per-agent SandboxTemplate `secretKeyRef` (that
binding is cluster-verified and tracked separately, see ADR-0009). Rendered from
`agentSandbox.connectorSecrets` (agent name -> {NAME: value}); nothing renders
when the map is empty (the default), so a stock install is unaffected.
*/}}
{{- if .Values.agentSandbox.deploy }}
{{- range $agent, $secrets := .Values.agentSandbox.connectorSecrets }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentos.fullname" $ }}-agent-{{ $agent }}-connector-secrets
  labels:
    {{- include "agentos.labels" $ | nindent 4 }}
    agentos.dev/agent: {{ $agent | quote }}
  annotations:
    agentos.dev/purpose: per-agent-connector-secrets
type: Opaque
stringData:
  {{- /* Reserved boot-env guard (#457, ADR-0009). Each connector-secret KEY
       ($name, the inner uppercase env name -- NOT the camelCase agent map key
       $agent) must not shadow a runner-owned model credential or an AGENTOS_*
       boot key, which the sandbox boot injects and a connector secret could
       otherwise silently redirect. Reserved iff AGENTOS_-prefixed OR one of the
       four non-prefixed credential keys enumerated in
       `agentos.reservedConnectorSecretNames`. A reserved name aborts the ENTIRE
       render fail-closed (edge case 7) -- intended: a bad name must never reach
       a cluster, and `fail` is the only render-time stop Helm offers. */}}
  {{- $reserved := splitList " " (trim (include "agentos.reservedConnectorSecretNames" $)) }}
  {{- range $name, $value := $secrets }}
  {{- if or (hasPrefix "AGENTOS_" $name) (has $name $reserved) }}
  {{- fail (printf "agentSandbox.connectorSecrets.%s.%s uses a reserved boot-env name (%q); a connector secret must not shadow a runner-owned model credential, an AGENTOS_* boot key, or a redirect/capture-capable key (proxy/CA/custom-headers)" $agent $name $name) }}
  {{- end }}
  {{ $name }}: {{ $value | quote }}
  {{- end }}
{{- end }}
{{- end }}
