{{- /*
Pack an IPv4 dotted-quad into a 32-bit integer, e.g. "169.254.169.254" ->
2852039166. Used by agentos.metadataExcept to test CIDR containment.
*/ -}}
{{- define "agentos.ipv4ToInt" -}}
{{- $o := splitList "." (trim .) -}}
{{- add (mul (int64 (index $o 0)) 16777216) (mul (int64 (index $o 1)) 65536) (mul (int64 (index $o 2)) 256) (int64 (index $o 3)) -}}
{{- end -}}
{{- /*
Given an allowedEgress CIDR string, return the metadata/link-local `except`
entry that must be carved back out of it, or "" when the CIDR cannot reach the
cloud metadata endpoint. NetworkPolicy allows are additive, so a broad allow
(the realistic 0.0.0.0/0 model-API case, or a 0.0.0.0/1 + 128.0.0.0/1 split, or
::/0) re-permits the metadata IP that rail 1 denies -- unless we except it.

Kubernetes requires each `except` to be the same address family as `cidr` and a
strict subset of it, so we (a) pick the family from the CIDR, (b) only emit when
the CIDR actually contains the metadata address, and (c) size the IPv4 except to
stay a STRICT subset (169.254.0.0/16 for prefix <16, the /32 host for 16..<32,
and nothing for an exact /32 host allow, which is a deliberate operator choice).

IPv4 containment is computed exactly (top `prefix` bits of 169.254.169.254 vs the
network). IPv6 covers the realistic broad cases -- ::/0 and the AWS IMDS ULA
prefix fd00:ec2::/nn -- and carves out fd00:ec2::254; full IPv6 range math is not
attempted (documented assumption). Operators can always override with an explicit
per-entry `except:` list, which wins over this auto carve-out.
*/ -}}
{{- define "agentos.metadataExcept" -}}
{{- $parts := splitList "/" . -}}
{{- $ip := index $parts 0 -}}
{{- $prefix := index $parts 1 | int -}}
{{- if contains ":" $ip -}}
  {{- if or (eq $prefix 0) (and (hasPrefix "fd00:ec2:" $ip) (le $prefix 32)) -}}fd00:ec2::254/128{{- end -}}
{{- else -}}
  {{- $meta := include "agentos.ipv4ToInt" "169.254.169.254" | int64 -}}
  {{- $net := include "agentos.ipv4ToInt" $ip | int64 -}}
  {{- $block := int64 1 -}}
  {{- range until (sub 32 $prefix | int) -}}{{- $block = mul $block 2 -}}{{- end -}}
  {{- if eq (div $meta $block) (div $net $block) -}}
    {{- /* Size the except to stay a STRICT subset of cidr (apiserver requires
           exceptMaskLen > cidrMaskLen). prefix<16 -> the /16 link-local block;
           16<=prefix<32 -> the /32 host; prefix==32 is the operator explicitly
           allowing exactly the metadata host, so emit nothing (any except would
           equal cidr and be rejected -- respect the deliberate allow). */ -}}
    {{- if lt $prefix 16 -}}169.254.0.0/16{{- else if lt $prefix 32 -}}169.254.169.254/32{{- end -}}
  {{- end -}}
{{- end -}}
{{- end -}}
{{- if and .Values.agentSandbox.deploy .Values.security.networkPolicy.enabled }}
{{- $np := .Values.security.networkPolicy }}
{{/*
Rail 1: default-deny egress on runner sandboxes, with explicit allows.

These policies select THIS release's runner sandbox pods by their full release
labels (name + instance + component: runner-sandbox), so two AgentOS releases
sharing a namespace do not cross-affect each other's egress (NetworkPolicy allows
are additive, so a shared component-only selector would leak one release's
allowlist onto another's). A pod matched by ANY egress policy is default-deny for
egress except what some policy explicitly allows -- so the base "deny" plus the
narrow "allow" policies below compose into: DNS + the in-chart collector (when
deployed) + the declared model/MCP egress are permitted, and EVERYTHING else
(arbitrary internet AND the cloud metadata endpoint 169.254.169.254) is denied.
Fail-closed: an empty allowedEgress means the runner can resolve names and ship
traces but reach nothing else outbound until the operator declares where the
model API and MCP servers live.

A customer CNI that does not enforce NetworkPolicy turns all of this into a
silent false-pass; the security probe's before/after egress check exists to
catch exactly that.
*/}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agentos.fullname" . }}-runner-default-deny-egress
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-sandbox
spec:
  podSelector:
    matchLabels:
      {{- include "agentos.selectorLabels" (dict "root" . "component" "runner-sandbox") | nindent 6 }}
  policyTypes: [Egress]
  # No egress rules == deny all egress for the selected pods.
{{- if $np.allowDNS }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agentos.fullname" . }}-runner-allow-dns
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-sandbox
spec:
  podSelector:
    matchLabels:
      {{- include "agentos.selectorLabels" (dict "root" . "component" "runner-sandbox") | nindent 6 }}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $np.dnsNamespace }}
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
{{- end }}
{{- if .Values.otelCollector.deploy }}
---
{{/* Allow the runner to ship OTLP traces to THIS release's in-chart collector.
     Without this, the default-deny blocks span export and sandbox traces vanish
     whenever the observability backbone is deployed alongside the rails. */}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agentos.fullname" . }}-runner-allow-collector
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-sandbox
spec:
  podSelector:
    matchLabels:
      {{- include "agentos.selectorLabels" (dict "root" . "component" "runner-sandbox") | nindent 6 }}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
          podSelector:
            matchLabels:
              {{- include "agentos.selectorLabels" (dict "root" . "component" "otel-collector") | nindent 14 }}
      ports:
        - { protocol: TCP, port: {{ .Values.otelCollector.service.grpcPort }} }
        - { protocol: TCP, port: {{ .Values.otelCollector.service.httpPort }} }
{{- end }}
{{- if and .Values.minio.deploy .Values.agentSandbox.runner.bundleFetch.enabled }}
---
{{/* Allow the runner's bundle-fetch init container to reach THIS release's
     in-chart MinIO for the plugin-bundle object. Mirrors the collector carve-out
     above: without it, rail 1's default-deny blocks the S3 fetch and every bound
     sandbox fails closed. BYO S3 (minio.deploy=false) is an external host, so it
     goes through the operator's allowedEgress list instead. */}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agentos.fullname" . }}-runner-allow-minio
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-sandbox
spec:
  podSelector:
    matchLabels:
      {{- include "agentos.selectorLabels" (dict "root" . "component" "runner-sandbox") | nindent 6 }}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
          podSelector:
            matchLabels:
              {{- include "agentos.selectorLabels" (dict "root" . "component" "minio") | nindent 14 }}
      ports:
        - { protocol: TCP, port: 9000 }
{{- end }}
{{- if .Values.inference.deploy }}
---
{{/* Allow the runner to reach THIS release's in-cluster inference endpoint.
     Keeping it as a pod carve-out preserves the external egress allowlist's
     fail-closed default. */}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agentos.fullname" . }}-runner-allow-inference
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-sandbox
spec:
  podSelector:
    matchLabels:
      {{- include "agentos.selectorLabels" (dict "root" . "component" "runner-sandbox") | nindent 6 }}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
          podSelector:
            matchLabels:
              {{- include "agentos.selectorLabels" (dict "root" . "component" "inference") | nindent 14 }}
      ports:
        - { protocol: TCP, port: {{ .Values.inference.port }} }
{{- end }}
{{- if $np.allowedEgress }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agentos.fullname" . }}-runner-allow-egress
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-sandbox
spec:
  podSelector:
    matchLabels:
      {{- include "agentos.selectorLabels" (dict "root" . "component" "runner-sandbox") | nindent 6 }}
  policyTypes: [Egress]
  egress:
    {{- range $np.allowedEgress }}
    - to:
        - ipBlock:
            cidr: {{ .cidr }}
            {{- /* NetworkPolicy allows are additive, so a broad allow (the
                   realistic 0.0.0.0/0 model-API case, a /1 split, or ::/0) would
                   re-permit the cloud metadata endpoint that rail 1 blocks. Carve
                   it back out with `except`. An explicit per-entry `except:` list
                   wins; otherwise agentos.metadataExcept returns a same-family,
                   subset-safe carve-out for ANY CIDR that contains the metadata
                   address (not just exact /0), and "" for CIDRs that cannot reach
                   it. See the helper for the containment/family rules. */}}
            {{- if .except }}
            except:
              {{- toYaml .except | nindent 14 }}
            {{- else }}
            {{- $auto := include "agentos.metadataExcept" .cidr | trim }}
            {{- if $auto }}
            except:
              - {{ $auto }}
            {{- end }}
            {{- end }}
      {{- with .ports }}
      ports:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
{{- end }}
{{- if $np.lockIngress }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agentos.fullname" . }}-runner-ingress
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-sandbox
spec:
  podSelector:
    matchLabels:
      {{- include "agentos.selectorLabels" (dict "root" . "component" "runner-sandbox") | nindent 6 }}
  policyTypes: [Ingress]
  # The worker dials the claimed sandbox on the ACI port; allow ingress to it
  # from within the release namespace only.
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
      ports:
        - { protocol: TCP, port: {{ .Values.agentSandbox.runner.port }} }
{{- end }}
{{- end }}
