{{- $gvisorClass := include "agentos.gvisor.className" . }}
{{- if and .Values.agentSandbox.deploy (eq (.Values.security.gvisor.mode | default "auto") "require") .Values.security.gvisorPreflight.enabled }}
{{/*
Rail 4 preflight (security.gvisor.mode=require only): gVisor RuntimeClass is
present AND enforced.

A pre-install / pre-upgrade hook (also runnable via `helm test`) whose pod runs
UNDER the runner's RuntimeClass. This makes the check RBAC-free and tests the
real property:

  - RuntimeClass missing  -> the pod is rejected at admission ("RuntimeClass
    '<name>' not found"), the hook Job fails, and the install is blocked -- so a
    runsc-less cluster never silently ships runner pods with no kernel isolation.
  - RuntimeClass present but downgraded to runc -> the pod runs but /proc reports
    the host kernel, and the script fails.
  - gVisor actually enforced -> `uname` reports a gVisor sentry kernel
    (e.g. 4.19.0-gvisor), distinct from the host, and the check passes.

This fail-hard behavior is the `require` posture. `auto` never renders this Job
(it degrades to no-gvisor with a NOTES warning instead); `off` disables the rail.
*/}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "agentos.fullname" . }}-preflight-gvisor
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-sandbox
  annotations:
    # When the chart itself creates the RuntimeClass (installRuntimeClass=true),
    # that object is a NORMAL resource applied after pre-install hooks -- so this
    # check runs POST-install/upgrade (the class exists by then) and a failure
    # still fails the release closed. Otherwise it runs pre-install to block a
    # broken install up front. Both branches also run on `helm test`.
    "helm.sh/hook": {{ if .Values.security.gvisor.installRuntimeClass }}post-install,post-upgrade,test{{ else }}pre-install,pre-upgrade,test{{ end }}
    "helm.sh/hook-weight": "-9"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        {{- include "agentos.selectorLabels" (dict "root" . "component" "preflight-gvisor") | nindent 8 }}
    spec:
      restartPolicy: Never
      runtimeClassName: {{ $gvisorClass }}
      containers:
        - name: gvisor-check
          image: {{ .Values.security.gvisorPreflight.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              echo "== AgentOS gVisor RuntimeClass preflight (mode=require) =="
              echo "requested RuntimeClass: {{ $gvisorClass }}"
              kernel=$(uname -a)
              echo "pod kernel: ${kernel}"
              if echo "${kernel}" | grep -qi gvisor; then
                echo "RESULT: PASS - pod runs under a gVisor sentry kernel; kernel isolation enforced."
                exit 0
              fi
              echo "RESULT: FAIL - the pod scheduled but its kernel is NOT gVisor. The RuntimeClass"
              echo "        exists but is downgraded to runc, so runner pods would have no kernel"
              echo "        isolation. Fix the containerd runsc handler on every node, or set"
              echo "        security.gvisor.mode=auto (degrade gracefully) or off (disable knowingly)."
              exit 1
          resources:
            {{- toYaml .Values.security.gvisorPreflight.resources | nindent 12 }}
{{- end }}
{{- if and .Values.security.gvisor.installRuntimeClass $gvisorClass }}
---
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: {{ $gvisorClass }}
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
handler: {{ .Values.security.gvisor.handler }}
{{- end }}
