{{- if and .Values.agentSandbox.deploy .Values.security.probe.enabled }}
{{- $h := .Values.agentSandbox.runner.hardening }}
{{/*
The PT-3 security-boundary probe suite, re-run against the chart's rendered
defaults as a `helm test`. Five claims:

  1. default-deny egress + metadata endpoint blocked, WITH a before/after control
     that proves the CNI actually enforces (not a silent false-pass).
  2. cross-agent secret isolation via per-agent RBAC scoping.
  3. runner containers are non-root with a read-only rootfs.
  4. gVisor RuntimeClass enforced (reported testable / not-testable honestly;
     enforcement itself is asserted by the preflight-gvisor hook).
  5. data-tier ingress isolation: a release-app-labeled pod reaches each deployed
     store's port while a non-app-labeled pod is blocked (the data-tier rail).

Claim 3 is a self-contained hardened Pod (the pod IS the test). Claims 1, 2, 4, 5
run from a kubectl-driven orchestrator with a scoped ServiceAccount.
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "agentos.fullname" . }}-security-probe
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "-5"
    # Privileged RBAC (can read namespace secrets) must NOT outlive the test:
    # clean up whether the test succeeds or fails, and re-create on the next run.
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "agentos.fullname" . }}-security-probe
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "-5"
    # Privileged RBAC (can read namespace secrets) must NOT outlive the test:
    # clean up whether the test succeeds or fails, and re-create on the next run.
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
rules:
  - apiGroups: [""]
    resources: [pods]
    verbs: [create, delete, get, list, watch]
  - apiGroups: [""]
    resources: [pods/exec]
    verbs: [create]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get]
  - apiGroups: [""]
    # The probe only create/deletes its own test secrets by name; the "can-i
    # list secrets" isolation check runs under the agent token (a
    # SelfSubjectAccessReview needs no list grant here). Do not add `list`:
    # it would let this hook enumerate and read every secret in the namespace.
    resources: [secrets]
    verbs: [create, delete, get]
  - apiGroups: [""]
    resources: [serviceaccounts]
    verbs: [create, delete, get]
  - apiGroups: [""]
    resources: [serviceaccounts/token]
    verbs: [create]
  - apiGroups: [networking.k8s.io]
    resources: [networkpolicies]
    verbs: [create, delete, get, list]
  - apiGroups: [rbac.authorization.k8s.io]
    resources: [roles, rolebindings]
    verbs: [create, delete, get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "agentos.fullname" . }}-security-probe
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "-4"
    # Privileged RBAC binding: clean up on success or failure (see the Role/SA).
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "agentos.fullname" . }}-security-probe
subjects:
  - kind: ServiceAccount
    name: {{ include "agentos.fullname" . }}-security-probe
    namespace: {{ .Release.Namespace }}
---
{{- if $h.enabled }}
{{/* Claim 3: non-root + read-only rootfs. The pod IS the test, hardened with the
     SAME securityContext the chart applies to runner sandboxes. Only rendered
     when hardening is enabled -- otherwise the real runner is not hardened and a
     passing probe here would be a false security result. */}}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "agentos.fullname" . }}-security-probe-hardening
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: {{ $h.runAsUser }}
    runAsGroup: {{ $h.runAsGroup }}
    fsGroup: {{ $h.fsGroup }}
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: hardening
      image: {{ .Values.security.probe.busyboxImage }}
      imagePullPolicy: {{ .Values.global.imagePullPolicy }}
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        capabilities:
          drop: [ALL]
      command:
        - /bin/sh
        - -c
        - |
          echo "== Claim 3: non-root + read-only rootfs =="
          id
          rc=0
          if echo "$(id -u)" | grep -qx "{{ $h.runAsUser }}"; then
            echo "PASS: running as uid {{ $h.runAsUser }} (non-root)"
          else
            echo "FAIL: expected uid {{ $h.runAsUser }}, got $(id -u)"; rc=1
          fi
          if touch /nope 2>/dev/null; then
            echo "FAIL: wrote to / -- rootfs is NOT read-only"; rc=1
          else
            echo "PASS: write to / blocked (read-only rootfs)"
          fi
          exit $rc
      resources:
        {{- toYaml .Values.security.probe.resources | nindent 8 }}
{{- end }}
---
{{/* Claims 1, 2, 4, 5: kubectl-driven orchestrator (alpine/k8s ships kubectl).
     $dt is the space-separated host:port list of stores Claim 5 probes (one
     representative data port each). Keep this store set + ports in sync with the
     $stores catalog in security-datatier-networkpolicy.yaml -- each port here
     must be in that store's allow-list or Claim 5 red-fails a correct rail.
     Claim 5 only asserts the data-tier boundary when the rail that creates it is
     enabled AND the store is in-chart-deployed; BYO stores are external and
     excluded. Both a disabled rail and all-BYO stores yield an empty list =>
     Claim 5 skips. */}}
{{- $dt := list -}}
{{- if .Values.security.dataTierNetworkPolicy.enabled -}}
{{- if .Values.postgres.deploy }}{{- $dt = append $dt (printf "%s:5432" (include "agentos.postgres.host" .)) -}}{{- end }}
{{- if .Values.minio.deploy }}{{- $dt = append $dt (printf "%s:9000" (include "agentos.minio.host" .)) -}}{{- end }}
{{- if .Values.clickhouse.deploy }}{{- $dt = append $dt (printf "%s:8123" (include "agentos.clickhouse.host" .)) -}}{{- end }}
{{- if .Values.valkey.deploy }}{{- $dt = append $dt (printf "%s:6379" (include "agentos.valkey.host" .)) -}}{{- end }}
{{- end -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "agentos.fullname" . }}-security-probe
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        {{- include "agentos.selectorLabels" (dict "root" . "component" "security-probe") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "agentos.fullname" . }}-security-probe
      restartPolicy: Never
      containers:
        - name: probe
          image: {{ .Values.security.probe.kubectlImage }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: NS
              value: {{ .Release.Namespace | quote }}
            - name: BLOCKED
              value: {{ .Values.security.probe.blockedTarget | quote }}
            - name: RC
              value: {{ include "agentos.gvisor.className" . | quote }}
            - name: EGRESS_POD
              value: {{ include "agentos.fullname" . }}-egress-probe
            - name: NETSHOOT
              value: {{ .Values.security.probe.netshootImage | quote }}
            - name: BUSYBOX
              value: {{ .Values.security.probe.busyboxImage | quote }}
            - name: ALLOW_ALL_NP
              value: {{ include "agentos.fullname" . }}-security-probe-allow-all
            - name: BROAD_ALLOW_NP
              value: {{ include "agentos.fullname" . }}-security-probe-broad-allow
            # The egress-probe carries this release's runner-sandbox labels (so the
            # chart's default-deny selects it) PLUS a unique per-release probe label.
            # The temporary allow-all selects ONLY the unique label, so it never
            # opens egress on real runner sandboxes sharing the namespace.
            - name: PROBE_LABELS
              value: "app.kubernetes.io/name={{ include "agentos.name" . }},app.kubernetes.io/instance={{ .Release.Name }},app.kubernetes.io/component=runner-sandbox,agentos.io/egress-probe={{ .Release.Name }}"
            - name: PROBE_UNIQUE_VAL
              value: {{ .Release.Name | quote }}
            # Claim 5: data-tier ingress isolation. Deployed-store host:port list
            # (empty => skip). Two probe pods: the ALLOWED one carries this
            # release's app labels (rail SHOULD permit it), the DENIED one carries
            # only a probe label with NO app labels (rail SHOULD block it).
            - name: DATATIER_TARGETS
              value: {{ join " " $dt | quote }}
            - name: DT_ALLOWED_POD
              value: {{ include "agentos.fullname" . }}-dt-probe-allowed
            - name: DT_DENIED_POD
              value: {{ include "agentos.fullname" . }}-dt-probe-denied
            - name: DT_ALLOWED_LABELS
              value: "app.kubernetes.io/name={{ include "agentos.name" . }},app.kubernetes.io/instance={{ .Release.Name }},agentos.io/datatier-probe=allowed"
            - name: DT_DENIED_LABELS
              value: "agentos.io/datatier-probe=denied"
          command:
            - /bin/bash
            - -c
            - |
              set -u
              fail=0
              cleanup() {
                kubectl delete pod "$EGRESS_POD" sp-gvisor-check -n "$NS" --ignore-not-found >/dev/null 2>&1 || true
                kubectl delete pod "$DT_ALLOWED_POD" "$DT_DENIED_POD" -n "$NS" --ignore-not-found >/dev/null 2>&1 || true
                kubectl delete networkpolicy "$ALLOW_ALL_NP" "$BROAD_ALLOW_NP" -n "$NS" --ignore-not-found >/dev/null 2>&1 || true
                kubectl delete secret sp-agent-a-creds sp-agent-b-creds -n "$NS" --ignore-not-found >/dev/null 2>&1 || true
                kubectl delete serviceaccount sp-agent-a -n "$NS" --ignore-not-found >/dev/null 2>&1 || true
                kubectl delete role sp-agent-a -n "$NS" --ignore-not-found >/dev/null 2>&1 || true
                kubectl delete rolebinding sp-agent-a -n "$NS" --ignore-not-found >/dev/null 2>&1 || true
              }
              trap cleanup EXIT

              echo "###############################################"
              echo "# AgentOS A2 security probe (claims 1, 2, 4, 5)"
              echo "###############################################"

              # ================= Claim 1: egress + metadata (before/after) ==========
              echo ""
              echo "== Claim 1: default-deny egress + metadata, with before/after control =="
              kubectl run "$EGRESS_POD" -n "$NS" --image="$NETSHOOT" --restart=Never \
                --labels="$PROBE_LABELS" \
                --command -- sleep 3600 >/dev/null
              kubectl wait --for=condition=Ready "pod/$EGRESS_POD" -n "$NS" --timeout=120s >/dev/null

              probe_rc() { # $1=url -> prints curl exit code from inside the labeled pod
                kubectl exec -n "$NS" "$EGRESS_POD" -- sh -c "curl -m 6 -sS -o /dev/null '$1' >/dev/null 2>&1; echo rc=\$?" 2>/dev/null | sed -n 's/.*rc=//p'
              }
              classify() { case "$1" in 28|7|6|5|"") echo blocked;; *) echo reachable;; esac; }

              # Baseline control: temporarily allow ALL egress on runner-sandbox pods.
              cat <<EOF | kubectl apply -f - >/dev/null
              apiVersion: networking.k8s.io/v1
              kind: NetworkPolicy
              metadata:
                name: ${ALLOW_ALL_NP}
                namespace: ${NS}
              spec:
                podSelector:
                  matchLabels:
                    agentos.io/egress-probe: ${PROBE_UNIQUE_VAL}
                policyTypes: [Egress]
                egress:
                  - {}
              EOF
              sleep 5
              before=$(classify "$(probe_rc "https://${BLOCKED}/")")
              echo "phase 1 (allow-all egress):  ${BLOCKED} -> ${before}"

              # Remove the allow-all; now only the chart's default-deny + allow-dns apply.
              kubectl delete networkpolicy "$ALLOW_ALL_NP" -n "$NS" --ignore-not-found >/dev/null
              sleep 5
              after_ext=$(classify "$(probe_rc "https://${BLOCKED}/")")
              after_meta=$(classify "$(probe_rc "http://169.254.169.254/latest/meta-data/")")
              dns_ok=no
              kubectl exec -n "$NS" "$EGRESS_POD" -- sh -c "nslookup ${BLOCKED} >/dev/null 2>&1" && dns_ok=yes
              echo "phase 2 (chart default-deny): ${BLOCKED} -> ${after_ext}   metadata(169.254.169.254) -> ${after_meta}   dns-resolves -> ${dns_ok}"
              kubectl delete pod "$EGRESS_POD" -n "$NS" --ignore-not-found >/dev/null

              if [ "$before" = reachable ] && [ "$after_ext" = blocked ] && [ "$after_meta" = blocked ] && [ "$dns_ok" = yes ]; then
                echo "RESULT: PASS - CNI enforces (reachable->blocked flip); arbitrary egress AND the"
                echo "        cloud metadata endpoint are denied; DNS still resolves."
              else
                echo "RESULT: FAIL - before=${before} after=${after_ext} metadata=${after_meta} dns=${dns_ok}"
                echo "        (a non-enforcing CNI shows before=after=reachable: silent false-pass.)"
                fail=1
              fi

              # ---- Claim 1b: metadata blocked UNDER a broad (0.0.0.0/0) allowlist ----
              # Phase 2 proves default-deny blocks metadata. This proves the additive
              # carve-out: a broad allow (the realistic model-API 0.0.0.0/0 case) must
              # reach the internet yet keep the metadata endpoint blocked via `except`.
              # Mirrors exactly what the chart renders for allowedEgress:[{cidr:0.0.0.0/0}]
              # (issue #70: a broad allow must not silently re-open IMDS).
              echo ""
              echo "== Claim 1b: metadata blocked under a broad 0.0.0.0/0 allowlist =="
              kubectl run "$EGRESS_POD" -n "$NS" --image="$NETSHOOT" --restart=Never \
                --labels="$PROBE_LABELS" \
                --command -- sleep 3600 >/dev/null
              kubectl wait --for=condition=Ready "pod/$EGRESS_POD" -n "$NS" --timeout=120s >/dev/null
              cat <<EOF | kubectl apply -f - >/dev/null
              apiVersion: networking.k8s.io/v1
              kind: NetworkPolicy
              metadata:
                name: ${BROAD_ALLOW_NP}
                namespace: ${NS}
              spec:
                podSelector:
                  matchLabels:
                    agentos.io/egress-probe: ${PROBE_UNIQUE_VAL}
                policyTypes: [Egress]
                egress:
                  - to:
                      - ipBlock:
                          cidr: 0.0.0.0/0
                          except:
                            - 169.254.0.0/16
              EOF
              sleep 5
              broad_ext=$(classify "$(probe_rc "https://${BLOCKED}/")")
              broad_meta=$(classify "$(probe_rc "http://169.254.169.254/latest/meta-data/")")
              echo "phase 3 (broad allow + except): ${BLOCKED} -> ${broad_ext}   metadata(169.254.169.254) -> ${broad_meta}"
              kubectl delete networkpolicy "$BROAD_ALLOW_NP" -n "$NS" --ignore-not-found >/dev/null
              kubectl delete pod "$EGRESS_POD" -n "$NS" --ignore-not-found >/dev/null
              if [ "$broad_ext" = reachable ] && [ "$broad_meta" = blocked ]; then
                echo "RESULT: PASS - a broad 0.0.0.0/0 allow reaches the internet but the metadata"
                echo "        endpoint stays blocked (the except carve-out holds)."
              else
                echo "RESULT: FAIL - broad-allow ext=${broad_ext} metadata=${broad_meta}"
                echo "        (metadata=reachable means a broad allow re-opened IMDS: #70 regression.)"
                fail=1
              fi

              # ================= Claim 2: cross-agent secret isolation ==============
              echo ""
              echo "== Claim 2: cross-agent secret isolation (per-agent RBAC scoping) =="
              kubectl create secret generic sp-agent-a-creds -n "$NS" --from-literal=token=AAA >/dev/null
              kubectl create secret generic sp-agent-b-creds -n "$NS" --from-literal=token=BBB >/dev/null
              kubectl create serviceaccount sp-agent-a -n "$NS" >/dev/null
              kubectl create role sp-agent-a -n "$NS" --verb=get --resource=secrets --resource-name=sp-agent-a-creds >/dev/null
              kubectl create rolebinding sp-agent-a -n "$NS" --role=sp-agent-a --serviceaccount="${NS}:sp-agent-a" >/dev/null
              TOK=$(kubectl create token sp-agent-a -n "$NS")
              a_get=$(kubectl --token="$TOK" -n "$NS" auth can-i get secret/sp-agent-a-creds 2>/dev/null || true)
              b_get=$(kubectl --token="$TOK" -n "$NS" auth can-i get secret/sp-agent-b-creds 2>/dev/null || true)
              lst=$(kubectl --token="$TOK" -n "$NS" auth can-i list secrets 2>/dev/null || true)
              echo "agent-a get own secret: ${a_get}   get agent-b secret: ${b_get}   list secrets: ${lst}"
              if [ "$a_get" = yes ] && [ "$b_get" = no ] && [ "$lst" = no ]; then
                echo "RESULT: PASS - agent-a reads only its own credential; cannot read agent-b or list."
              else
                echo "RESULT: FAIL - expected yes/no/no, got ${a_get}/${b_get}/${lst}"
                fail=1
              fi

              # ================= Claim 4: gVisor availability =======================
              # Namespaced pod-admission probe (no cluster RBAC): try to schedule a
              # pod UNDER the runtimeclass; admission tells us if it exists, and the
              # kernel string tells us if it is actually enforced (vs downgraded).
              echo ""
              echo "== Claim 4: gVisor RuntimeClass =="
              if [ -z "$RC" ]; then
                echo "SKIP: security.gvisor.mode is off (kernel isolation disabled)."
              else
                gpod="sp-gvisor-check"
                kubectl delete pod "$gpod" -n "$NS" --ignore-not-found >/dev/null 2>&1 || true
                admit=$(kubectl run "$gpod" -n "$NS" --image="$BUSYBOX" --restart=Never \
                  --overrides="{\"spec\":{\"runtimeClassName\":\"${RC}\"}}" \
                  --command -- sh -c 'uname -a; sleep 3' 2>&1 || true)
                if echo "$admit" | grep -qi 'not found'; then
                  echo "NOT-TESTABLE: RuntimeClass '${RC}' absent on this cluster (admission: RuntimeClass"
                  echo "  not found). Reported, not faked (PT-3 discipline). gVisor kernel isolation was"
                  echo "  proven live in PT-3 (uname=4.19.0-gvisor); reinstall runsc to re-verify here."
                else
                  kubectl wait --for=jsonpath='{.status.phase}'=Succeeded "pod/$gpod" -n "$NS" --timeout=30s >/dev/null 2>&1 || \
                    kubectl wait --for=condition=Ready "pod/$gpod" -n "$NS" --timeout=30s >/dev/null 2>&1 || true
                  gkernel=$(kubectl logs "$gpod" -n "$NS" 2>/dev/null || true)
                  kubectl delete pod "$gpod" -n "$NS" --ignore-not-found >/dev/null 2>&1 || true
                  if echo "$gkernel" | grep -qi gvisor; then
                    echo "PASS: pod under RuntimeClass '${RC}' reports a gVisor kernel: ${gkernel}"
                  else
                    echo "FAIL: RuntimeClass '${RC}' exists but the pod kernel is NOT gVisor (downgraded"
                    echo "  to runc?). kernel=${gkernel}"
                    fail=1
                  fi
                fi
              fi

              # ================= Claim 5: data-tier ingress isolation ===============
              # Prove the data-tier rail: a pod carrying THIS release's app labels
              # can reach each deployed store's port (positive control), while a pod
              # with no app labels is blocked (the isolation the rail enforces).
              echo ""
              echo "== Claim 5: data-tier ingress isolation (default-deny + scoped-allow) =="
              if [ -z "$DATATIER_TARGETS" ]; then
                echo "SKIP: data-tier NetworkPolicy rail disabled or no in-chart store deployed"
              else
                kubectl run "$DT_ALLOWED_POD" -n "$NS" --image="$NETSHOOT" --restart=Never \
                  --labels="$DT_ALLOWED_LABELS" --command -- sleep 3600 >/dev/null
                kubectl run "$DT_DENIED_POD" -n "$NS" --image="$NETSHOOT" --restart=Never \
                  --labels="$DT_DENIED_LABELS" --command -- sleep 3600 >/dev/null
                kubectl wait --for=condition=Ready "pod/$DT_ALLOWED_POD" -n "$NS" --timeout=120s >/dev/null
                kubectl wait --for=condition=Ready "pod/$DT_DENIED_POD" -n "$NS" --timeout=120s >/dev/null

                dt_reach() { # $1=pod $2=host $3=port -> prints reachable|blocked
                  rc=$(kubectl exec -n "$NS" "$1" -- sh -c "nc -z -w5 $2 $3 >/dev/null 2>&1; echo rc=\$?" 2>/dev/null | sed -n 's/.*rc=//p')
                  [ "$rc" = 0 ] && echo reachable || echo blocked
                }

                dt_fail=0
                for target in $DATATIER_TARGETS; do
                  host=${target%:*}
                  port=${target##*:}
                  allowed=$(dt_reach "$DT_ALLOWED_POD" "$host" "$port")
                  denied=$(dt_reach "$DT_DENIED_POD" "$host" "$port")
                  echo "${target} allowed->${allowed} denied->${denied}"
                  if [ "$allowed" != reachable ] || [ "$denied" != blocked ]; then
                    echo "RESULT: FAIL - ${target}: allowed=${allowed} (want reachable) denied=${denied} (want blocked)"
                    echo "        (allowed=blocked => rail misconfigured; denied=reachable => isolation breach"
                    echo "         OR a non-enforcing CNI silently no-oping the policy.)"
                    dt_fail=1
                    fail=1
                  fi
                done
                kubectl delete pod "$DT_ALLOWED_POD" "$DT_DENIED_POD" -n "$NS" --ignore-not-found >/dev/null 2>&1 || true
                if [ "$dt_fail" = 0 ]; then
                  echo "RESULT: PASS - release app pods reach the data tier; non-app pods are blocked."
                fi
              fi

              echo ""
              echo "== Claim 3 (non-root + read-only rootfs) runs as the separate hardening test pod =="
              echo ""
              [ "$fail" = 0 ] && echo "SECURITY PROBE: PASS" || echo "SECURITY PROBE: FAIL"
              exit $fail
{{- end }}
