{{- if .Values.langfuse.deploy }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentos.fullname" . }}-langfuse-web
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
spec:
  type: {{ .Values.langfuse.web.service.type }}
  selector:
    {{- include "agentos.selectorLabels" (dict "root" . "component" "langfuse-web") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.langfuse.web.service.port }}
      targetPort: 3000
      {{- if and (eq .Values.langfuse.web.service.type "NodePort") .Values.langfuse.web.service.nodePort }}
      nodePort: {{ .Values.langfuse.web.service.nodePort }}
      {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentos.fullname" . }}-langfuse-web
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "agentos.selectorLabels" (dict "root" . "component" "langfuse-web") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agentos.labels" . | nindent 8 }}
        {{- include "agentos.selectorLabels" (dict "root" . "component" "langfuse-web") | nindent 8 }}
    spec:
      containers:
        - name: langfuse-web
          image: "{{ .Values.langfuse.image.web }}:{{ .Values.langfuse.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            {{- include "agentos.langfuse.env" . | nindent 12 }}
            {{- if .Values.langfuse.web.nodeOptions }}
            - name: NODE_OPTIONS
              value: {{ .Values.langfuse.web.nodeOptions | quote }}
            {{- end }}
            - name: NEXTAUTH_URL
              value: {{ .Values.langfuse.nextauthUrl | quote }}
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.langfuse.existingSecret | default (include "agentos.secretName" .) }}
                  key: langfuseNextauthSecret
            # Headless bootstrap: fixed dev org/project + keys so the OTel path
            # authenticates on first boot with no manual key-minting.
            - name: LANGFUSE_INIT_ORG_ID
              value: {{ .Values.langfuse.init.orgId | quote }}
            - name: LANGFUSE_INIT_ORG_NAME
              value: {{ .Values.langfuse.init.orgName | quote }}
            - name: LANGFUSE_INIT_PROJECT_ID
              value: {{ .Values.langfuse.init.projectId | quote }}
            - name: LANGFUSE_INIT_PROJECT_NAME
              value: {{ .Values.langfuse.init.projectName | quote }}
            - name: LANGFUSE_INIT_PROJECT_PUBLIC_KEY
              value: {{ .Values.langfuse.init.projectPublicKey | quote }}
            - name: LANGFUSE_INIT_PROJECT_SECRET_KEY
              value: {{ .Values.langfuse.init.projectSecretKey | quote }}
            - name: LANGFUSE_INIT_USER_EMAIL
              value: {{ .Values.langfuse.init.userEmail | quote }}
            - name: LANGFUSE_INIT_USER_NAME
              value: {{ .Values.langfuse.init.userName | quote }}
            - name: LANGFUSE_INIT_USER_PASSWORD
              value: {{ .Values.langfuse.init.userPassword | quote }}
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/public/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/public/health
              port: 3000
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 6
          resources:
            {{- toYaml .Values.langfuse.web.resources | nindent 12 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentos.fullname" . }}-langfuse-worker
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "agentos.selectorLabels" (dict "root" . "component" "langfuse-worker") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agentos.labels" . | nindent 8 }}
        {{- include "agentos.selectorLabels" (dict "root" . "component" "langfuse-worker") | nindent 8 }}
    spec:
      containers:
        - name: langfuse-worker
          image: "{{ .Values.langfuse.image.worker }}:{{ .Values.langfuse.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            {{- include "agentos.langfuse.env" . | nindent 12 }}
            {{- if .Values.langfuse.worker.nodeOptions }}
            - name: NODE_OPTIONS
              value: {{ .Values.langfuse.worker.nodeOptions | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: 3030
          resources:
            {{- toYaml .Values.langfuse.worker.resources | nindent 12 }}
{{- end }}
