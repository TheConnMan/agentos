{{- if .Values.api.deploy }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentos.fullname" . }}-api
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  selector:
    {{- include "agentos.selectorLabels" (dict "root" . "component" "api") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentos.fullname" . }}-api
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "agentos.selectorLabels" (dict "root" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agentos.labels" . | nindent 8 }}
        {{- include "agentos.selectorLabels" (dict "root" . "component" "api") | nindent 8 }}
    spec:
      # The runner-logs proxy lists pods and reads pod logs via the K8s API, so
      # the API pod runs as its own ServiceAccount (see api-rbac.yaml).
      serviceAccountName: {{ include "agentos.fullname" . }}-api
      {{- with .Values.api.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.api.migrate.enabled }}
      # Bring the schema to head before the server boots. The init container
      # re-runs until it succeeds, so it also serves as a wait-for-Postgres gate
      # on a fresh install (migration 0001 creates the `agentos` schema).
      initContainers:
        - name: migrate
          image: {{ include "agentos.image" (dict "repository" .Values.api.image.repository "tag" .Values.api.image.tag "digest" .Values.api.image.digest "defaultTag" .Chart.AppVersion) | quote }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          {{- with .Values.api.containerSecurityContext }}
          {{- include "agentos.containerSecurityContext" . | nindent 10 }}
          {{- end }}
          command: ["alembic", "-c", "alembic.ini", "upgrade", "head"]
          env:
            {{- include "agentos.env.postgres" . | nindent 12 }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "agentos.image" (dict "repository" .Values.api.image.repository "tag" .Values.api.image.tag "digest" .Values.api.image.digest "defaultTag" .Chart.AppVersion) | quote }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          {{- with .Values.api.containerSecurityContext }}
          {{- include "agentos.containerSecurityContext" . | nindent 10 }}
          {{- end }}
          env:
            {{- include "agentos.env.postgres" . | nindent 12 }}
            {{- include "agentos.env.valkey" . | nindent 12 }}
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentos.secretName" . }}
                  key: apiKey
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentos.secretName" . }}
                  key: githubWebhookSecret
            - name: ENVIRONMENT
              value: {{ .Values.api.environment | quote }}
            - name: ORG_NAME
              value: {{ .Values.api.orgName | quote }}
            - name: LANGFUSE_HOST
              value: http://{{ include "agentos.langfuse.webHost" . }}:{{ .Values.langfuse.web.service.port }}
            - name: LANGFUSE_PUBLIC_KEY
              value: {{ .Values.langfuse.init.projectPublicKey | quote }}
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.langfuse.existingSecret | default (include "agentos.secretName" .) }}
                  key: langfuseInitProjectSecretKey
            - name: S3_ENDPOINT_URL
              value: http://{{ include "agentos.minio.host" . }}:{{ .Values.minio.port }}
            - name: S3_ACCESS_KEY
              value: {{ .Values.minio.auth.rootUser | quote }}
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.minio.existingSecret | default (include "agentos.secretName" .) }}
                  key: minioRootPassword
            # Immutable plugin-bundle bucket. Single source of truth with the
            # runner sandbox's bundle-fetch init container: the API writes each
            # uploaded bundle here, the fetcher reads it from the same bucket, so
            # an operator override of bundleFetch.bucket keeps them in lockstep.
            - name: BUNDLE_BUCKET
              value: {{ .Values.agentSandbox.runner.bundleFetch.bucket | quote }}
            # Resume reconciler (#411) knobs; see values.yaml api.resumeReconciler.
            # ENABLED false also switches the resolve endpoint to fail-loud on
            # enqueue failure (no backstop to defer to).
            - name: RESUME_RECONCILER_ENABLED
              value: {{ .Values.api.resumeReconciler.enabled | quote }}
            - name: RESUME_RECONCILER_INTERVAL_SECONDS
              value: {{ .Values.api.resumeReconciler.intervalSeconds | quote }}
            - name: RESUME_RECONCILER_GRACE_SECONDS
              value: {{ .Values.api.resumeReconciler.graceSeconds | quote }}
            - name: RESUME_RECONCILER_BATCH_LIMIT
              value: {{ .Values.api.resumeReconciler.batchLimit | quote }}
            # Slack bot token for the approval user-group authorizer (#420): the
            # API resolves usergroups.users.list itself rather than trusting a
            # caller-asserted membership claim (ADR-0034). Same shared secret key
            # the dispatcher and worker read, so no new secret material. Rendered
            # unconditionally, mirroring worker.yaml's ref to the same key; a
            # declared approver group with no token then fails closed at resolve
            # time, which is the intended posture.
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentos.secretName" . }}
                  key: slackBotToken
            # Expiry sweeper cadence (#412). Rendered unconditionally, not behind
            # an optional-value guard, because the disable value 0 is falsy in Go
            # templates and would be silently dropped, leaving the app default
            # instead of disabling. <= 0 disables the sweeper.
            - name: APPROVAL_SWEEP_INTERVAL_S
              value: {{ .Values.api.approvalSweepIntervalSeconds | quote }}
            # How long a fetched user-group member set is reused (#420). Rendered
            # unconditionally for the same reason as the sweeper above: 0 is the
            # meaningful strict-mode value (fetch per resolve) and is falsy in Go
            # templates, so an optional-value guard would silently drop exactly
            # the setting an operator is trying to make.
            - name: SLACK_USERGROUP_CACHE_TTL_S
              value: {{ .Values.api.slackUsergroupCacheTtlSeconds | quote }}
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 6
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
{{- end }}
