# E2E / runsc-less overlay: turn the agent-sandbox ON with every security rail
# EXCEPT gVisor kernel isolation, for clusters that do not have runsc + the
# containerd runtime handler installed (the current k8scratch after its resize,
# a plain kind cluster, etc.). Every other rail stays ON -- default-deny egress
# + metadata block, per-agent secret isolation, and non-root/read-only-rootfs.
#
# Layer it on top of a base profile (values order matters: this must come last):
#   helm install <release> charts/agentos -n <ns> --create-namespace \
#     -f charts/agentos/values-dev.yaml \
#     -f charts/agentos/values-e2e-nogvisor.yaml
#
# To restore the gVisor rail once runsc is installed on the node, simply drop
# this overlay -- runtimeClassName defaults back to "gvisor" and the preflight
# re-arms.
#
# NOTE: the agent-sandbox controller and the runner image are separate e2e
# prerequisites owned by G1 (agentSandbox.controller.deploy / image import);
# this overlay only governs the security posture, not those.

agentSandbox:
  deploy: true
  runner:
    # No runsc on the node -> opt out of the gVisor kernel-isolation rail.
    # Empty string means "set no runtimeClassName", so pods schedule on the
    # default runtime. This alone also disables the gVisor preflight (it only
    # renders when runtimeClassName is non-empty).
    runtimeClassName: ""

security:
  gvisorPreflight:
    # Redundant with runtimeClassName="" above, but explicit: do not run the
    # gVisor enforcement preflight on a cluster without runsc.
    enabled: false
