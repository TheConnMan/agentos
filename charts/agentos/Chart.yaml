apiVersion: v2
name: agentos
description: >-
  AgentOS (Relay) umbrella chart. Installs the whole self-hosted stack on a
  single node: Langfuse v3 (web + worker) plus its ClickHouse, Valkey, Postgres,
  and MinIO backing stores, and the OTel Collector that adapts app traces into
  Langfuse. Every backing store is condition-gated with a bring-your-own block,
  and two install-time preflights ship baked in: a CPU-AVX / ClickHouse-pin
  check and a NetworkPolicy-enforcement probe.
type: application
version: 0.4.0
appVersion: "0.4.0"
kubeVersion: ">=1.25.0-0"
maintainers:
  - name: AgentOS
home: https://github.com/curie-eng/agentos
icon: https://raw.githubusercontent.com/curie-eng/agentos/main/apps/ui/public/favicon.svg
sources:
  - https://github.com/curie-eng/agentos
keywords:
  - agentos
  - langfuse
  - agents
  - observability
